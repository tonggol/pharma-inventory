<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<div layout:fragment="content">

    <!-- Page Header -->
    <div class="page-header">
        <h1>Dashboard</h1>
        <button class="btn btn-primary d-flex align-items-center">
            <i data-feather="download" class="me-2"></i> Generate Report
        </button>
    </div>

    <!-- Summary Cards -->
    <div class="row">
        <div class="col-md-6 col-lg-3">
            <div class="card summary-card">
                <div class="card-body">
                    <h5 class="card-title">Total Medicines</h5>
                    <p class="card-text" th:text="${summary.totalMedicines}">123</p>
                </div>
            </div>
        </div>
        <div class="col-md-6 col-lg-3">
            <div class="card summary-card">
                <div class="card-body">
                    <h5 class="card-title">Low Stock Alerts</h5>
                    <p class="card-text text-danger" th:text="${summary.lowStockCount}">5</p>
                </div>
            </div>
        </div>
        <div class="col-md-6 col-lg-3">
            <div class="card summary-card">
                <div class="card-body">
                    <h5 class="card-title">Expiring Soon</h5>
                    <p class="card-text text-warning" th:text="${summary.expiringCount}">12</p>
                </div>
            </div>
        </div>
        <div class="col-md-6 col-lg-3">
            <div class="card summary-card">
                <div class="card-body">
                    <h5 class="card-title">Total Stock Value</h5>
                    <p class="card-text" th:text="'₩' + ${#numbers.formatDecimal(summary.totalStockValue, 1, 'COMMA', 0, 'POINT')}">₩1.2M</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content Row -->
    <div class="row">
        <!-- Recent Activities Column -->
        <div class="col-lg-7">
            <div class="card">
                <div class="card-header">Recent Activities</div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Medicine</th>
                                <th>Type</th>
                                <th>Quantity</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="activity : ${recentActivities}">
                                <td th:text="${#temporals.format(activity.transactionDate, 'yyyy-MM-dd HH:mm')}">2023-10-27 10:00</td>
                                <td th:text="${activity.medicineName}">Aspirin</td>
                                <td><span class="badge" th:classappend="${activity.transactionType == 'INBOUND' ? 'bg-success-soft' : 'bg-danger-soft'}" th:text="${activity.transactionType}">OUTBOUND</span></td>
                                <td th:text="${activity.quantity}">10</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Stock Alerts Column -->
        <div class="col-lg-5">
            <div class="card">
                <div class="card-header">Stock Alerts</div>
                <div class="card-body">
                    <h6>Expiring Stocks (Next 30 days)</h6>
                    <table class="table table-sm">
                        <tbody>
                            <tr th:each="stock : ${expiringStocks}">
                                <td th:text="${stock.medicineName}">Ibuprofen</td>
                                <td th:text="${stock.lotNumber}">L12345</td>
                                <td class="text-end"><span class="badge bg-warning-soft" th:text="${stock.quantity} + ' units'">50 units</span></td>
                            </tr>
                        </tbody>
                    </table>

                    <h6 class="mt-4">Low Stock Medicines</h6>
                    <table class="table table-sm">
                        <tbody>
                            <tr th:each="med : ${lowStockMedicines}">
                                <td th:text="${med.medicineName}">Paracetamol</td>
                                <td class="text-end"><span class="badge bg-danger-soft" th:text="${med.totalQuantity} + ' / ' + ${med.minStockQuantity}">20 / 50</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
