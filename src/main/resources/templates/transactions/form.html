<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<div layout:fragment="content">

    <!-- Page Header -->
    <div class="page-header">
        <h1>New Stock Transaction</h1>
    </div>

    <form id="transaction-form" method="post">
        <div class="card">
            <div class="card-header d-flex align-items-center">
                <i data-feather="edit-3" class="me-2"></i>
                <span>Transaction Details</span>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="transactionType" class="form-label">Transaction Type</label>
                        <select id="transactionType" name="transactionType" class="form-select" required>
                            <option value="" disabled selected>Select Type...</option>
                            <option value="inbound">Inbound</option>
                            <option value="outbound">Outbound</option>
                            <option value="adjustment">Adjustment</option>
                            <option value="return">Return</option>
                            <option value="disposal">Disposal</option>
                            <option value="transfer">Transfer</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="reason" class="form-label">Reason</label>
                        <select id="reason" name="reason" class="form-select" required>
                            <option th:each="r : ${T(com.pharma.inventory.entity.TransactionReason).values()}" th:value="${r}" th:text="${r.description}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="stockId" class="form-label">Stock ID</label>
                        <input type="number" id="stockId" name="stockId" class="form-control">
                        <div class="form-text">Required for most transactions. For new inbound, use the Stock page.</div>
                    </div>
                    <div class="col-md-6">
                        <label for="quantity" class="form-label">Quantity</label>
                        <input type="number" id="quantity" name="quantity" class="form-control" required>
                        <div class="form-text">Use a negative number for outbound, disposal, etc.</div>
                    </div>
                    <div class="col-md-6">
                        <label for="department" class="form-label">Department</label>
                        <input type="text" id="department" name="department" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label for="patientId" class="form-label">Patient ID</label>
                        <input type="text" id="patientId" name="patientId" class="form-control">
                    </div>
                    <div class="col-12">
                        <label for="notes" class="form-label">Notes</label>
                        <textarea id="notes" name="notes" class="form-control" rows="3"></textarea>
                    </div>
                </div>
            </div>
            <div class="card-footer text-end">
                <a th:href="@{/transactions}" class="btn btn-outline-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary d-flex align-items-center d-inline-flex">
                    <i data-feather="save" class="me-2"></i> Process Transaction
                </button>
            </div>
        </div>
    </form>

    <script>
        document.getElementById('transaction-form').addEventListener('submit', function(e) {
            const type = document.getElementById('transactionType').value;
            if (type) {
                this.action = `/api/transactions/${type}`;
            } else {
                e.preventDefault();
                alert('Please select a transaction type.');
            }
        });
    </script>
</div>
</html>
