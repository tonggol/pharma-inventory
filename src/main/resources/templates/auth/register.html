<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会員登録 - PharmaInventory</title>

    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-color: #2c5aa0;
            --secondary-color: #34d399;
            --accent-color: #f59e0b;
            --danger-color: #ef4444;
            --success-color: #10b981;
            --dark-color: #1f2937;
            --light-color: #f8fafc;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            line-height: 1.6;
            color: var(--dark-color);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }

        .register-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
            margin: 2rem;
        }

        .register-header {
            background: linear-gradient(135deg, var(--primary-color), #1e40af);
            color: white;
            padding: 3rem 2rem 2rem;
            text-align: center;
            position: relative;
        }

        .register-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="register-grid" width="10" height="10" patternUnits="userSpaceOnUse"><path d="M 10 0 L 0 0 0 10" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/></pattern></defs><rect width="100" height="100" fill="url(%23register-grid)"/></svg>');
        }

        .register-header-content {
            position: relative;
            z-index: 2;
        }

        .register-icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
            color: white;
        }

        .register-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .register-subtitle {
            opacity: 0.9;
            font-size: 1rem;
        }

        .register-form {
            padding: 3rem 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-weight: 600;
            color: var(--dark-color);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
        }

        .form-label i {
            margin-right: 0.5rem;
            color: var(--primary-color);
        }

        .required {
            color: var(--danger-color);
            margin-left: 0.25rem;
        }

        .form-control {
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: var(--light-color);
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(44, 90, 160, 0.25);
            background: white;
        }

        .form-control.is-invalid {
            border-color: var(--danger-color);
            box-shadow: 0 0 0 0.2rem rgba(239, 68, 68, 0.25);
        }

        .form-control.is-valid {
            border-color: var(--success-color);
            box-shadow: 0 0 0 0.2rem rgba(16, 185, 129, 0.25);
        }

        .form-select {
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            background: var(--light-color);
            transition: all 0.3s ease;
        }

        .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(44, 90, 160, 0.25);
            background: white;
        }

        .invalid-feedback {
            color: var(--danger-color);
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        .valid-feedback {
            color: var(--success-color);
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        .password-strength {
            margin-top: 0.5rem;
        }

        .strength-bar {
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .strength-fill {
            height: 100%;
            transition: width 0.3s ease, background-color 0.3s ease;
            width: 0%;
        }

        .strength-weak .strength-fill {
            background: var(--danger-color);
            width: 25%;
        }

        .strength-fair .strength-fill {
            background: var(--accent-color);
            width: 50%;
        }

        .strength-good .strength-fill {
            background: var(--success-color);
            width: 75%;
        }

        .strength-strong .strength-fill {
            background: var(--primary-color);
            width: 100%;
        }

        .strength-text {
            font-size: 0.875rem;
            font-weight: 500;
        }

        .btn-register {
            background: linear-gradient(135deg, var(--primary-color), #1e40af);
            border: none;
            color: white;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .btn-register:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(44, 90, 160, 0.4);
            color: white;
        }

        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-link {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
        }

        .login-link a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-link a:hover {
            color: #1e40af;
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            border-radius: 12px;
            border: none;
            margin-bottom: 1.5rem;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            border-left: 4px solid var(--success-color);
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger-color);
            border-left: 4px solid var(--danger-color);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .register-container {
                margin: 1rem;
                border-radius: 16px;
            }

            .register-header {
                padding: 2rem 1.5rem 1.5rem;
            }

            .register-title {
                font-size: 1.5rem;
            }

            .register-form {
                padding: 2rem 1.5rem;
            }

            .form-group {
                margin-bottom: 1.25rem;
            }
        }

        /* アニメーション */
        .form-group {
            animation: fadeInUp 0.5s ease-out;
            animation-fill-mode: both;
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }
        .form-group:nth-child(4) { animation-delay: 0.4s; }
        .form-group:nth-child(5) { animation-delay: 0.5s; }
        .form-group:nth-child(6) { animation-delay: 0.6s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
<div class="register-container">
    <!-- Header -->
    <div class="register-header">
        <div class="register-header-content">
            <div class="register-icon">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1 class="register-title">会員登録</h1>
            <p class="register-subtitle">PharmaInventoryへようこそ</p>
        </div>
    </div>

    <!-- Registration Form -->
    <div class="register-form">
        <!-- Alert Messages -->
        <div id="alertContainer"></div>

        <form id="registerForm" novalidate>
            <div class="row">
                <!-- ユーザー名 -->
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="username" class="form-label">
                            <i class="fas fa-user"></i>
                            ユーザー名 <span class="required">*</span>
                        </label>
                        <input type="text" class="form-control" id="username" name="username"
                               placeholder="英数字、アンダースコアのみ" required>
                        <div class="invalid-feedback"></div>
                        <div class="valid-feedback">使用可能なユーザー名です</div>
                    </div>
                </div>

                <!-- 氏名 -->
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="fullName" class="form-label">
                            <i class="fas fa-id-card"></i>
                            氏名 <span class="required">*</span>
                        </label>
                        <input type="text" class="form-control" id="fullName" name="fullName"
                               placeholder="氏名を入力してください" required>
                        <div class="invalid-feedback"></div>
                    </div>
                </div>
            </div>

            <!-- メールアドレス -->
            <div class="form-group">
                <label for="email" class="form-label">
                    <i class="fas fa-envelope"></i>
                    メールアドレス <span class="required">*</span>
                </label>
                <input type="email" class="form-control" id="email" name="email"
                       placeholder="example@company.com" required>
                <div class="invalid-feedback"></div>
                <div class="valid-feedback">有効なメールアドレス形式です</div>
            </div>

            <!-- パスワード -->
            <div class="form-group">
                <label for="password" class="form-label">
                    <i class="fas fa-lock"></i>
                    パスワード <span class="required">*</span>
                </label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="英数字、特殊文字を含む8文字以上" required>
                <div class="password-strength">
                    <div class="strength-bar">
                        <div class="strength-fill"></div>
                    </div>
                    <div class="strength-text">パスワード強度: <span id="strengthLevel">-</span></div>
                </div>
                <div class="invalid-feedback"></div>
            </div>

            <div class="row">
                <!-- 部署 -->
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="department" class="form-label">
                            <i class="fas fa-building"></i>
                            部署
                        </label>
                        <select class="form-select" id="department" name="department">
                            <option value="">部署を選択してください</option>
                            <option value="PHARMACY">薬局</option>
                            <option value="WAREHOUSE">倉庫</option>
                            <option value="ADMIN">管理部署</option>
                            <option value="IT">IT部署</option>
                            <option value="MEDICAL">医療部署</option>
                            <option value="FINANCE">財務部署</option>
                        </select>
                    </div>
                </div>

                <!-- 役職 -->
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="position" class="form-label">
                            <i class="fas fa-briefcase"></i>
                            役職
                        </label>
                        <input type="text" class="form-control" id="position" name="position"
                               placeholder="例: 主任, 係長, 課長">
                    </div>
                </div>
            </div>

            <div class="row">
                <!-- 権限 -->
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="role" class="form-label">
                            <i class="fas fa-shield-alt"></i>
                            権限 <span class="required">*</span>
                        </label>
                        <select class="form-select" id="role" name="role" required>
                            <option value="">権限を選択してください</option>
                            <option value="USER">一般ユーザー</option>
                            <option value="STAFF">スタッフ</option>
                            <option value="PHARMACIST">薬剤師</option>
                            <option value="MANAGER">マネージャー</option>
                            <option value="ADMIN">管理者</option>
                        </select>
                        <div class="invalid-feedback"></div>
                    </div>
                </div>

                <!-- 電話番号 -->
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="phoneNumber" class="form-label">
                            <i class="fas fa-phone"></i>
                            電話番号
                        </label>
                        <input type="tel" class="form-control" id="phoneNumber" name="phoneNumber"
                               placeholder="090-1234-5678">
                        <div class="invalid-feedback"></div>
                    </div>
                </div>
            </div>

            <!-- 社員番号 (任意) -->
            <div class="form-group">
                <label for="employeeId" class="form-label">
                    <i class="fas fa-id-badge"></i>
                    社員番号
                </label>
                <input type="text" class="form-control" id="employeeId" name="employeeId"
                       placeholder="社員番号 (任意)">
            </div>

            <!-- 会員登録ボタン -->
            <button type="submit" class="btn btn-register" id="registerBtn">
                <div class="loading-spinner"></div>
                <span class="btn-text">
                        <i class="fas fa-user-plus me-2"></i>
                        会員登録
                    </span>
            </button>
        </form>

        <!-- ログインリンク -->
        <div class="login-link">
            <p>すでにアカウントをお持ちですか？ <a href="/login">ログイン</a></p>
        </div>
    </div>
</div>

<!-- Bootstrap 5.3 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    class RegisterForm {
        constructor() {
            this.form = document.getElementById('registerForm');
            this.alertContainer = document.getElementById('alertContainer');
            this.registerBtn = document.getElementById('registerBtn');
            this.loadingSpinner = document.querySelector('.loading-spinner');
            this.btnText = document.querySelector('.btn-text');

            this.initializeEventListeners();
            this.initializeValidation();
        }

        initializeEventListeners() {
            this.form.addEventListener('submit', (e) => this.handleSubmit(e));

            // リアルタイムバリデーション
            const inputs = this.form.querySelectorAll('input, select');
            inputs.forEach(input => {
                input.addEventListener('blur', () => this.validateField(input));
                input.addEventListener('input', () => {
                    if (input.name === 'password') {
                        this.updatePasswordStrength(input.value);
                    }
                    if (input.classList.contains('is-invalid')) {
                        this.validateField(input);
                    }
                });
            });
        }

        initializeValidation() {
            // パスワード強度の初期化
            this.updatePasswordStrength('');
        }

        async handleSubmit(e) {
            e.preventDefault();

            if (!this.validateForm()) {
                this.showAlert('入力情報を確認してください。', 'danger');
                return;
            }

            this.setLoading(true);

            try {
                const formData = this.getFormData();
                const response = await this.submitRegistration(formData);

                this.showAlert('会員登録が完了しました！ログインページに移動します。', 'success');

                setTimeout(() => {
                    window.location.href = '/login';
                }, 2000);

            } catch (error) {
                console.error('Registration error:', error);
                this.showAlert(error.message || '会員登録中にエラーが発生しました。', 'danger');
            } finally {
                this.setLoading(false);
            }
        }

        async submitRegistration(formData) {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(formData)
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.message || data.error || '会員登録に失敗しました。');
            }

            return data;
        }

        getFormData() {
            const formData = new FormData(this.form);
            const data = {};

            for (const [key, value] of formData.entries()) {
                if (value.trim() !== '') {
                    data[key] = value.trim();
                }
            }

            return data;
        }

        validateForm() {
            const inputs = this.form.querySelectorAll('input[required], select[required]');
            let isValid = true;

            inputs.forEach(input => {
                if (!this.validateField(input)) {
                    isValid = false;
                }
            });

            return isValid;
        }

        validateField(input) {
            const value = input.value.trim();
            const name = input.name;
            let isValid = true;
            let message = '';

            // 必須フィールドのチェック
            if (input.required && !value) {
                isValid = false;
                message = 'このフィールドは必須です。';
            } else {
                // 個別フィールドのバリデーション
                switch (name) {
                    case 'username':
                        if (value.length < 3 || value.length > 50) {
                            isValid = false;
                            message = 'ユーザー名は3〜50文字である必要があります。';
                        } else if (!/^[a-zA-Z0-9_]+$/.test(value)) {
                            isValid = false;
                            message = '英数字とアンダースコアのみ使用できます。';
                        }
                        break;

                    case 'email':
                        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                        if (!emailRegex.test(value)) {
                            isValid = false;
                            message = '有効なメールアドレス形式ではありません。';
                        }
                        break;

                    case 'password':
                        if (value.length < 8) {
                            isValid = false;
                            message = 'パスワードは8文字以上である必要があります。';
                        } else if (!/^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]+$/.test(value)) {
                            isValid = false;
                            message = '英字、数字、特殊文字を含める必要があります。';
                        }
                        break;

                    case 'phoneNumber':
                        if (value && !/^[0-9-]+$/.test(value)) {
                            isValid = false;
                            message = '数字とハイフンのみ使用できます。';
                        }
                        break;

                    case 'fullName':
                        if (value.length > 100) {
                            isValid = false;
                            message = '氏名は100文字を超えることはできません。';
                        }
                        break;
                }
            }

            this.setFieldValidation(input, isValid, message);
            return isValid;
        }

        setFieldValidation(input, isValid, message) {
            const feedback = input.parentNode.querySelector('.invalid-feedback');

            input.classList.remove('is-valid', 'is-invalid');

            if (isValid && input.value.trim()) {
                input.classList.add('is-valid');
            } else if (!isValid) {
                input.classList.add('is-invalid');
                if (feedback) {
                    feedback.textContent = message;
                }
            }
        }

        updatePasswordStrength(password) {
            const strengthBar = document.querySelector('.strength-bar');
            const strengthLevel = document.getElementById('strengthLevel');

            let strength = 0;
            let level = '';

            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password)) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            strengthBar.className = 'strength-bar';

            if (strength === 0) {
                level = '-';
            } else if (strength <= 2) {
                level = '弱い';
                strengthBar.classList.add('strength-weak');
            } else if (strength === 3) {
                level = '普通';
                strengthBar.classList.add('strength-fair');
            } else if (strength === 4) {
                level = '良好';
                strengthBar.classList.add('strength-good');
            } else {
                level = '強力';
                strengthBar.classList.add('strength-strong');
            }

            strengthLevel.textContent = level;
        }

        setLoading(isLoading) {
            this.registerBtn.disabled = isLoading;

            if (isLoading) {
                this.loadingSpinner.style.display = 'inline-block';
                this.btnText.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>登録中...';
            } else {
                this.loadingSpinner.style.display = 'none';
                this.btnText.innerHTML = '<i class="fas fa-user-plus me-2"></i>会員登録';
            }
        }

        showAlert(message, type) {
            const alertClass = type === 'success' ? 'alert-success' : 'alert-danger';
            const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';

            const alert = document.createElement('div');
            alert.className = `alert ${alertClass}`;
            alert.innerHTML = `
                    <i class="fas ${icon} me-2"></i>
                    ${message}
                `;

            this.alertContainer.innerHTML = '';
            this.alertContainer.appendChild(alert);

            // 自動削除 (成功メッセージでない場合)
            if (type !== 'success') {
                setTimeout(() => {
                    alert.remove();
                }, 5000);
            }
        }
    }

    // ページ読み込み完了時に初期化
    document.addEventListener('DOMContentLoaded', function() {
        new RegisterForm();
    });

    // キーボードショートカット
    document.addEventListener('keydown', function(e) {
        // Escapeキーでホームに移動
        if (e.key === 'Escape') {
            if (confirm('会員登録をキャンセルしてホームページに移動しますか？')) {
                window.location.href = '/';
            }
        }
    });
</script>
</body>
</html>
