<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}">
<head>
    <title>医薬品管理 - 医薬品在庫管理システム</title>
</head>

<th:block layout:fragment="css">
    <style>
        /* 医薬品リスト特化スタイル */
        .page-header {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: #64748b;
            font-size: 1.1rem;
            margin-bottom: 0;
        }

        .search-card {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
        }

        .search-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--dark-color);
            font-size: 0.9rem;
        }

        .form-control {
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(44, 90, 160, 0.25);
            outline: none;
        }

        .form-select {
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(44, 90, 160, 0.25);
            outline: none;
        }

        .search-actions {
            display: flex;
            gap: 1rem;
            grid-column: 1 / -1;
            justify-content: flex-end;
            margin-top: 1rem;
        }

        .btn {
            border-radius: 12px;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), #1e40af);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(44, 90, 160, 0.3);
            color: white;
        }

        .btn-outline-secondary {
            background: white;
            border: 2px solid var(--border-color);
            color: var(--dark-color);
        }

        .btn-outline-secondary:hover {
            background: #f8fafc;
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success-color), #059669);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
            color: white;
        }

        .content-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .content-header {
            padding: 2rem;
            border-bottom: 1px solid var(--border-color);
            background: #f8fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--dark-color);
            margin: 0;
        }

        .content-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .table-container {
            overflow-x: auto;
        }

        .medicines-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        .medicines-table th {
            background: #f8fafc;
            padding: 1.25rem 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--dark-color);
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
        }

        .medicines-table td {
            padding: 1.25rem 1rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        .medicines-table tbody tr {
            transition: all 0.2s ease;
        }

        .medicines-table tbody tr:hover {
            background: rgba(44, 90, 160, 0.05);
            transform: scale(1.002);
        }

        .medicine-code {
            font-family: 'Courier New', monospace;
            background: rgba(59, 130, 246, 0.1);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #1e40af;
            font-weight: 600;
        }

        .medicine-name {
            font-weight: 600;
            color: var(--dark-color);
            margin-bottom: 0.25rem;
        }

        .medicine-name-en {
            font-size: 0.85rem;
            color: #64748b;
            font-style: italic;
        }

        .manufacturer {
            color: #64748b;
            font-size: 0.9rem;
        }

        .category-badge {
            background: linear-gradient(135deg, var(--secondary-color), #10b981);
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .stock-info {
            text-align: center;
        }

        .current-stock {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 0.25rem;
        }

        .min-stock {
            font-size: 0.8rem;
            color: #64748b;
        }

        .stock-status {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .stock-status.sufficient {
            background: rgba(16, 185, 129, 0.1);
            color: #065f46;
        }

        .stock-status.low {
            background: rgba(245, 158, 11, 0.1);
            color: #92400e;
        }

        .stock-status.critical {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }

        .status-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-badge.active {
            background: rgba(16, 185, 129, 0.1);
            color: #065f46;
        }

        .status-badge.inactive {
            background: rgba(107, 114, 128, 0.1);
            color: #374151;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .btn-sm {
            padding: 0.5rem 0.75rem;
            font-size: 0.85rem;
            border-radius: 8px;
        }

        .btn-outline-primary {
            background: white;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
        }

        .btn-outline-primary:hover {
            background: var(--primary-color);
            color: white;
        }

        .btn-outline-warning {
            background: white;
            border: 1px solid var(--warning-color);
            color: var(--warning-color);
        }

        .btn-outline-warning:hover {
            background: var(--warning-color);
            color: white;
        }

        .pagination-container {
            padding: 2rem;
            border-top: 1px solid var(--border-color);
            background: #f8fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pagination-info {
            color: #64748b;
            font-size: 0.9rem;
        }

        .pagination {
            display: flex;
            gap: 0.5rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .pagination .page-item {
            display: block;
        }

        .pagination .page-link {
            display: block;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--dark-color);
            text-decoration: none;
            transition: all 0.2s ease;
            background: white;
        }

        .pagination .page-link:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .pagination .page-item.active .page-link {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .pagination .page-item.disabled .page-link {
            background: #f8fafc;
            color: #94a3b8;
            border-color: var(--border-color);
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #64748b;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: #cbd5e1;
        }

        .empty-state-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--dark-color);
        }

        .empty-state-description {
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        /* レスポンシブデザイン */
        @media (max-width: 768px) {
            .search-form {
                grid-template-columns: 1fr;
            }

            .search-actions {
                grid-column: 1;
                justify-content: stretch;
            }

            .search-actions .btn {
                flex: 1;
                justify-content: center;
            }

            .content-header {
                flex-direction: column;
                gap: 1rem;
                align-items: stretch;
            }

            .content-actions {
                justify-content: stretch;
            }

            .content-actions .btn {
                flex: 1;
                justify-content: center;
            }

            .medicines-table {
                font-size: 0.85rem;
            }

            .medicines-table th,
            .medicines-table td {
                padding: 0.75rem 0.5rem;
            }

            .pagination-container {
                flex-direction: column;
                gap: 1rem;
            }
        }

        /* ローディング状態 */
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</th:block>

<div layout:fragment="content">
    <!-- ページヘッダー -->
    <div class="page-header">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h1 class="page-title">医薬品管理</h1>
                <p class="page-subtitle">登録された医薬品を管理し、在庫状況を確認できます。</p>
            </div>
            <div>
                <a href="/medicines/new" class="btn btn-success" sec:authorize="hasAnyRole('ADMIN','MANAGER','PHARMACIST')">
                    <i class="fas fa-plus"></i>
                    新規医薬品登録
                </a>
            </div>
        </div>
    </div>

    <!-- 検索フィルター -->
    <div class="search-card">
        <form class="search-form" id="searchForm" th:object="${searchRequest}">
            <div class="form-group">
                <label class="form-label" for="keyword">統合検索</label>
                <input type="text"
                       class="form-control"
                       id="keyword"
                       name="keyword"
                       th:field="*{keyword}"
                       placeholder="コード、名称、製造元で検索">
            </div>

            <div class="form-group">
                <label class="form-label" for="category">カテゴリ</label>
                <select class="form-select" id="category" name="category" th:field="*{category}">
                    <option value="">すべてのカテゴリ</option>
                    <option value="PAINKILLER">解熱鎮痛剤</option>
                    <option value="ANTIBIOTIC">抗生物質</option>
                    <option value="DIGESTIVE">消化器系薬物</option>
                    <option value="IV_SOLUTION">輸液剤</option>
                    <option value="HORMONE">ホルモン剤</option>
                    <option value="VITAMIN">ビタミン剤</option>
                    <option value="TOPICAL">外用剤</option>
                    <option value="ANTIHISTAMINE">抗ヒスタミン剤</option>
                    <option value="OTHER">その他</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="manufacturer">製造元</label>
                <input type="text"
                       class="form-control"
                       id="manufacturer"
                       name="manufacturer"
                       th:field="*{manufacturer}"
                       placeholder="製造元名">
            </div>

            <div class="form-group">
                <label class="form-label" for="isActive">状態</label>
                <select class="form-select" id="isActive" name="isActive" th:field="*{isActive}">
                    <option value="">すべて</option>
                    <option value="true">有効</option>
                    <option value="false">無効</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="isBelowMinStock">在庫状況</label>
                <select class="form-select" id="isBelowMinStock" name="isBelowMinStock" th:field="*{isBelowMinStock}">
                    <option value="">すべて</option>
                    <option value="true">在庫不足</option>
                    <option value="false">在庫十分</option>
                </select>
            </div>

            <div class="search-actions">
                <button type="button" class="btn btn-outline-secondary" onclick="resetSearch()">
                    <i class="fas fa-undo"></i>
                    リセット
                </button>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-search"></i>
                    検索
                </button>
            </div>
        </form>
    </div>

    <!-- 医薬品リスト -->
    <div class="content-card" id="medicinesContainer">
        <div class="content-header">
            <h2 class="content-title">
                医薬品一覧
                <span class="badge bg-primary" th:text="${medicines?.totalElements ?: 0}">0</span>
            </h2>
            <div class="content-actions">
                <div class="dropdown">
                    <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                        <i class="fas fa-download"></i>
                        エクスポート
                    </button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="/api/medicines/export?format=excel"><i class="fas fa-file-excel me-2"></i>Excel</a></li>
                        <li><a class="dropdown-item" href="/api/medicines/export?format=csv"><i class="fas fa-file-csv me-2"></i>CSV</a></li>
                        <li><a class="dropdown-item" href="/api/medicines/export?format=pdf"><i class="fas fa-file-pdf me-2"></i>PDF</a></li>
                    </ul>
                </div>
                <button class="btn btn-outline-secondary" onclick="location.reload()">
                    <i class="fas fa-sync-alt"></i>
                    更新
                </button>
            </div>
        </div>

        <div class="table-container">
            <table class="medicines-table" th:if="${medicines != null and #lists.size(medicines.content) > 0}">
                <thead>
                <tr>
                    <th>コード</th>
                    <th>医薬品名</th>
                    <th>製造元</th>
                    <th>カテゴリ</th>
                    <th>現在在庫</th>
                    <th>在庫状況</th>
                    <th>状態</th>
                    <th>登録日</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="medicine : ${medicines.content}">
                    <td>
                        <span class="medicine-code" th:text="${medicine.code}">MED001</span>
                    </td>
                    <td>
                        <div class="medicine-name" th:text="${medicine.name}">アスピリン</div>
                        <div class="medicine-name-en" th:text="${medicine.nameEn}" th:if="${medicine.nameEn}">Aspirin</div>
                    </td>
                    <td>
                        <span class="manufacturer" th:text="${medicine.manufacturer ?: '-'}">製造元名</span>
                    </td>
                    <td>
                        <span class="category-badge" th:text="${medicine.category ?: '未分類'}">解熱鎮痛剤</span>
                    </td>
                    <td class="stock-info">
                        <div class="current-stock" th:text="${medicine.currentStock ?: 0}">150</div>
                        <div class="min-stock">最小: <span th:text="${medicine.minStockQuantity ?: 0}">10</span></div>
                    </td>
                    <td>
                            <span class="stock-status"
                                  th:classappend="${(medicine.currentStock ?: 0) < (medicine.minStockQuantity ?: 0) ? 'critical' :
                                                   (medicine.currentStock ?: 0) < (medicine.minStockQuantity ?: 0) * 2 ? 'low' : 'sufficient'}"
                                  th:text="${(medicine.currentStock ?: 0) < (medicine.minStockQuantity ?: 0) ? '在庫不足' :
                                           (medicine.currentStock ?: 0) < (medicine.minStockQuantity ?: 0) * 2 ? '注意' : '十分'}">
                                十分
                            </span>
                    </td>
                    <td>
                            <span class="status-badge"
                                  th:classappend="${medicine.isActive ? 'active' : 'inactive'}"
                                  th:text="${medicine.isActive ? '有効' : '無効'}">
                                有効
                            </span>
                    </td>
                    <td th:text="${#temporals.format(medicine.createdAt, 'yyyy-MM-dd')}">2024-01-15</td>
                    <td>
                        <div class="action-buttons">
                            <a th:href="@{/medicines/{id}(id=${medicine.id})}"
                               class="btn btn-outline-primary btn-sm"
                               title="詳細表示">
                                <i class="fas fa-eye"></i>
                            </a>
                            <a th:href="@{/medicines/{id}/edit(id=${medicine.id})}"
                               class="btn btn-outline-warning btn-sm"
                               sec:authorize="hasAnyRole('ADMIN','MANAGER')"
                               title="修正">
                                <i class="fas fa-edit"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>

            <!-- 空の状態 -->
            <div class="empty-state" th:if="${medicines == null or #lists.size(medicines.content) == 0}">
                <div class="empty-state-icon">
                    <i class="fas fa-prescription-bottle"></i>
                </div>
                <h3 class="empty-state-title">登録された医薬品がありません</h3>
                <p class="empty-state-description">新しい医薬品を登録するか、検索条件を変更してみてください。</p>
                <a href="/medicines/new" class="btn btn-success">
                    <i class="fas fa-plus"></i>
                    医薬品を登録する
                </a>
            </div>
        </div>

        <!-- ページネーション -->
        <div class="pagination-container" th:if="${medicines != null and medicines.totalPages > 1}">
            <div class="pagination-info">
                <span th:text="|全 ${medicines.totalElements}件中 ${medicines.number * medicines.size + 1} - ${medicines.number * medicines.size + #lists.size(medicines.content)}件を表示|">
                    全 247件中 1-20件を表示
                </span>
            </div>

            <nav>
                <ul class="pagination">
                    <li class="page-item" th:classappend="${medicines.first ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/medicines(page=0, size=${medicines.size})}" th:unless="${medicines.first}">
                            <i class="fas fa-angle-double-left"></i>
                        </a>
                        <span class="page-link" th:if="${medicines.first}">
                            <i class="fas fa-angle-double-left"></i>
                        </span>
                    </li>

                    <li class="page-item" th:classappend="${medicines.first ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/medicines(page=${medicines.number - 1}, size=${medicines.size})}" th:unless="${medicines.first}">
                            <i class="fas fa-angle-left"></i>
                        </a>
                        <span class="page-link" th:if="${medicines.first}">
                            <i class="fas fa-angle-left"></i>
                        </span>
                    </li>

                    <li class="page-item"
                        th:each="pageNum : ${#numbers.sequence(T(java.lang.Math).max(0, medicines.number - 2), T(java.lang.Math).min(medicines.totalPages - 1, medicines.number + 2))}"
                        th:classappend="${pageNum == medicines.number ? 'active' : ''}">
                        <a class="page-link"
                           th:href="@{/medicines(page=${pageNum}, size=${medicines.size})}"
                           th:text="${pageNum + 1}">1</a>
                    </li>

                    <li class="page-item" th:classappend="${medicines.last ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/medicines(page=${medicines.number + 1}, size=${medicines.size})}" th:unless="${medicines.last}">
                            <i class="fas fa-angle-right"></i>
                        </a>
                        <span class="page-link" th:if="${medicines.last}">
                            <i class="fas fa-angle-right"></i>
                        </span>
                    </li>

                    <li class="page-item" th:classappend="${medicines.last ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/medicines(page=${medicines.totalPages - 1}, size=${medicines.size})}" th:unless="${medicines.last}">
                            <i class="fas fa-angle-double-right"></i>
                        </a>
                        <span class="page-link" th:if="${medicines.last}">
                            <i class="fas fa-angle-double-right"></i>
                        </span>
                    </li>
                </ul>
            </nav>
        </div>

        <!-- ローディングオーバーレイ -->
        <div class="loading-overlay" id="loadingOverlay" style="display: none;">
            <div class="spinner"></div>
        </div>
    </div>
</div>

<th:block layout:fragment="javascript">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 検索フォーム送信処理
            const searchForm = document.getElementById('searchForm');
            searchForm.addEventListener('submit', function(e) {
                e.preventDefault();
                performSearch();
            });

            // Enterキーで検索
            document.getElementById('keyword').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    performSearch();
                }
            });

            // 検索条件変更時に自動検索 (デバウンス)
            let searchTimeout;
            const searchInputs = ['category', 'isActive', 'isBelowMinStock'];
            searchInputs.forEach(inputId => {
                document.getElementById(inputId).addEventListener('change', function() {
                    clearTimeout(searchTimeout);
                    searchTimeout = setTimeout(performSearch, 300);
                });
            });
        });

        // 検索実行
        async function performSearch() {
            const formData = new FormData(document.getElementById('searchForm'));
            const searchParams = new URLSearchParams();

            // フォームデータをURLパラメータに変換
            for (let [key, value] of formData.entries()) {
                if (value && value.trim() !== '') {
                    searchParams.append(key, value);
                }
            }

            // ページ番号初期化
            searchParams.append('page', '0');
            searchParams.append('size', '20');

            // ローディング状態表示
            showLoading(true);

            try {
                // ページ移動
                window.location.href = '/medicines?' + searchParams.toString();
            } catch (error) {
                console.error('検索エラー:', error);
                showAlert('検索中にエラーが発生しました。', 'danger');
            } finally {
                showLoading(false);
            }
        }

        // 検索リセット
        function resetSearch() {
            document.getElementById('searchForm').reset();
            window.location.href = '/medicines';
        }

        // ローディング状態表示/非表示
        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            const container = document.getElementById('medicinesContainer');

            if (show) {
                overlay.style.display = 'flex';
                container.classList.add('loading');
            } else {
                overlay.style.display = 'none';
                container.classList.remove('loading');
            }
        }

        // 医薬品削除 (無効化)
        async function deleteMedicine(id, name) {
            if (!confirm(`「${name}」医薬品を無効化しますか？`)) {
                return;
            }

            try {
                const response = await ApiClient.delete(`/api/medicines/${id}`);
                if (response.success) {
                    showAlert('医薬品が無効化されました。', 'success');
                    setTimeout(() => location.reload(), 1000);
                }
            } catch (error) {
                showAlert(error.message || '医薬品の無効化中にエラーが発生しました。', 'danger');
            }
        }

        // 在庫状況に応じて行スタイルを更新
        function updateRowStyles() {
            const rows = document.querySelectorAll('.medicines-table tbody tr');
            rows.forEach(row => {
                const stockStatus = row.querySelector('.stock-status');
                if (stockStatus) {
                    if (stockStatus.classList.contains('critical')) {
                        row.style.borderLeft = '4px solid var(--danger-color)';
                    } else if (stockStatus.classList.contains('low')) {
                        row.style.borderLeft = '4px solid var(--warning-color)';
                    }
                }
            });
        }

        // ページロード完了後に実行
        window.addEventListener('load', function() {
            updateRowStyles();

            // URLパラメータからメッセージを確認
            const urlParams = new URLSearchParams(window.location.search);
            const message = urlParams.get('message');
            const error = urlParams.get('error');

            if (message) {
                showAlert(message, 'success');
            }
            if (error) {
                showAlert(error, 'danger');
            }
        });

        // キーボードショートカット
        document.addEventListener('keydown', function(e) {
            // Ctrl + F: 検索フィールドにフォーカス
            if (e.ctrlKey && e.key === 'f') {
                e.preventDefault();
                document.getElementById('keyword').focus();
            }

            // Ctrl + N: 新規医薬品登録 (権限がある場合)
            if (e.ctrlKey && e.key === 'n') {
                e.preventDefault();
                const newButton = document.querySelector('a[href="/medicines/new"]');
                if (newButton) {
                    window.location.href = '/medicines/new';
                }
            }
        });

        // テーブルソート (将来的に拡張)
        function sortTable(column) {
            // 実際の구현ではサーバーサイドソートのためにURLパラメータを追加
            console.log('Sort by:', column);
        }

        // 一括操作 (将来的に拡張)
        function bulkAction(action) {
            const checkboxes = document.querySelectorAll('input[name="selectedMedicines"]:checked');
            if (checkboxes.length === 0) {
                showAlert('操作する医薬品を選択してください。', 'warning');
                return;
            }

            const ids = Array.from(checkboxes).map(cb => cb.value);
            console.log('Bulk action:', action, 'IDs:', ids);

            // 実際の구현ではAPI呼び出し
        }
    </script>
