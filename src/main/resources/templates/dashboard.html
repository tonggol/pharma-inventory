<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}">
<head>
    <title>ダッシュボード - 医薬品在庫管理システム</title>
</head>

<th:block layout:fragment="css">
    <style>
        /* ダッシュボード特化スタイル */
        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .welcome-section {
            background: linear-gradient(135deg, var(--primary-color), #1e40af);
            color: white;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }

        .welcome-bg {
            position: absolute;
            top: 0;
            right: 0;
            opacity: 0.1;
            font-size: 8rem;
        }

        .welcome-content {
            position: relative;
            z-index: 1;
        }

        .welcome-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .welcome-subtitle {
            opacity: 0.9;
            font-size: 1rem;
        }

        /* 統計カード */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .stat-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .stat-card-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
        }

        .stat-card-icon.medicines { background: linear-gradient(135deg, var(--primary-color), #1e40af); }
        .stat-card-icon.stocks { background: linear-gradient(135deg, var(--success-color), #059669); }
        .stat-card-icon.low-stock { background: linear-gradient(135deg, var(--warning-color), #d97706); }
        .stat-card-icon.expired { background: linear-gradient(135deg, var(--danger-color), #dc2626); }
        .stat-card-icon.transactions { background: linear-gradient(135deg, #6366f1, #4f46e5); }

        .stat-card-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 0.25rem;
        }

        .stat-card-label {
            font-size: 0.9rem;
            color: #64748b;
            font-weight: 500;
        }

        .stat-card-change {
            font-size: 0.8rem;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .stat-card-change.positive { color: var(--success-color); }
        .stat-card-change.negative { color: var(--danger-color); }
        .stat-card-change.neutral { color: #64748b; }

        /* メイングリッド */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .dashboard-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .card-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
            background: #f8fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--dark-color);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card-icon {
            width: 24px;
            height: 24px;
            background: rgba(44, 90, 160, 0.1);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            font-size: 0.85rem;
        }

        .card-content {
            padding: 2rem;
        }

        /* チャートコンテナ */
        .chart-container {
            position: relative;
            height: 300px;
        }

        /* アクティビティリスト */
        .activity-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid #f1f5f9;
            transition: all 0.2s ease;
        }

        .activity-item:hover {
            background: #f8fafc;
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: white;
            flex-shrink: 0;
        }

        .activity-icon.INBOUND { background: var(--success-color); }
        .activity-icon.OUTBOUND { background: var(--warning-color); }
        .activity-icon.EXPIRED { background: var(--danger-color); }
        .activity-icon.ADJUSTMENT { background: #f59e0b; }

        .activity-content {
            flex: 1;
        }

        .activity-title {
            font-weight: 600;
            color: var(--dark-color);
            margin-bottom: 0.25rem;
        }

        .activity-description {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 0.25rem;
        }

        .activity-time {
            font-size: 0.75rem;
            color: #94a3b8;
        }

        /* 通知カード */
        .alert-items {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .alert-item {
            padding: 1rem;
            border-radius: 8px;
            border-left: 4px solid;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .alert-item.warning {
            background: rgba(245, 158, 11, 0.1);
            border-left-color: var(--warning-color);
        }

        .alert-item.danger {
            background: rgba(239, 68, 68, 0.1);
            border-left-color: var(--danger-color);
        }

        .alert-item.info {
            background: rgba(59, 130, 246, 0.1);
            border-left-color: #3b82f6;
        }

        .alert-icon {
            font-size: 1.2rem;
        }

        .alert-icon.warning { color: var(--warning-color); }
        .alert-icon.danger { color: var(--danger-color); }
        .alert-icon.info { color: #3b82f6; }

        .alert-content {
            flex: 1;
        }

        .alert-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .alert-message {
            font-size: 0.9rem;
            color: #64748b;
        }

        /* 下部グリッド */
        .bottom-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
        }

        /* クイックアクション */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .quick-action-btn {
            padding: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            background: white;
            color: var(--dark-color);
            text-decoration: none;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 500;
        }

        .quick-action-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(44, 90, 160, 0.15);
        }

        .quick-action-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .quick-action-icon.success { background: rgba(16, 185, 129, 0.1); color: var(--success-color); }
        .quick-action-icon.warning { background: rgba(245, 158, 11, 0.1); color: var(--warning-color); }
        .quick-action-icon.primary { background: rgba(44, 90, 160, 0.1); color: var(--primary-color); }
        .quick-action-icon.info { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }

        /* ローディング状態 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            color: #64748b;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin-right: 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* レスポンシブデザイン */
        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .bottom-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .welcome-section {
                padding: 1.5rem;
            }

            .card-content {
                padding: 1.5rem;
            }

            .quick-actions {
                grid-template-columns: 1fr;
            }
        }

        /* フェードインアニメーション */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        .slide-up {
            animation: slideUp 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="dashboard-container">
        <!-- ウェルカムセクション -->
        <div class="welcome-section fade-in">
            <div class="welcome-bg">
                <i class="fas fa-chart-pie"></i>
            </div>
            <div class="welcome-content">
                <h1 class="welcome-title">
                    こんにちは、<span sec:authentication="principal.fullName" th:text="${#authentication.principal.fullName ?: #authentication.principal.username}">ユーザー</span>さん!
                </h1>
                <p class="welcome-subtitle">
                    今日も安全で効率的な医薬品在庫管理を始めましょう。
                    <span id="currentDateTime"></span>
                </p>
            </div>
        </div>

        <!-- 統計カード -->
        <div class="stats-grid fade-in">
            <div class="stat-card" onclick="location.href='/medicines'">
                <div class="stat-card-header">
                    <div class="stat-card-icon medicines">
                        <i class="fas fa-pills"></i>
                    </div>
                </div>
                <div class="stat-card-value" id="totalMedicines">-</div>
                <div class="stat-card-label">登録医薬品</div>
                <div class="stat-card-change positive" id="medicinesChange">
                    <i class="fas fa-arrow-up"></i>
                    <span>有効な医薬品数</span>
                </div>
            </div>

            <div class="stat-card" onclick="location.href='/stocks'">
                <div class="stat-card-header">
                    <div class="stat-card-icon stocks">
                        <i class="fas fa-boxes"></i>
                    </div>
                </div>
                <div class="stat-card-value" id="totalStocks">-</div>
                <div class="stat-card-label">総在庫量</div>
                <div class="stat-card-change positive" id="stocksChange">
                    <i class="fas fa-info-circle"></i>
                    <span>在庫品目数</span>
                </div>
            </div>

            <div class="stat-card" onclick="location.href='/stocks?status=low'">
                <div class="stat-card-header">
                    <div class="stat-card-icon low-stock">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                </div>
                <div class="stat-card-value" id="lowStockItems">-</div>
                <div class="stat-card-label">在庫不足</div>
                <div class="stat-card-change negative" id="lowStockChange">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>注意が必要</span>
                </div>
            </div>

            <div class="stat-card" onclick="location.href='/stocks?expiry=expiring'">
                <div class="stat-card-header">
                    <div class="stat-card-icon expired">
                        <i class="fas fa-calendar-times"></i>
                    </div>
                </div>
                <div class="stat-card-value" id="expiringItems">-</div>
                <div class="stat-card-label">期限間近</div>
                <div class="stat-card-change neutral" id="expiringChange">
                    <i class="fas fa-clock"></i>
                    <span>30日以内</span>
                </div>
            </div>

            <div class="stat-card" onclick="location.href='/transactions'">
                <div class="stat-card-header">
                    <div class="stat-card-icon transactions">
                        <i class="fas fa-exchange-alt"></i>
                    </div>
                </div>
                <div class="stat-card-value" id="todayTransactions">-</div>
                <div class="stat-card-label">今日の取引</div>
                <div class="stat-card-change positive" id="transactionsChange">
                    <i class="fas fa-chart-line"></i>
                    <span>入出庫活動</span>
                </div>
            </div>
        </div>

        <!-- メインダッシュボードグリッド -->
        <div class="dashboard-grid slide-up">
            <!-- 在庫推移チャート -->
            <div class="dashboard-card">
                <div class="card-header">
                    <h3 class="card-title">
                        <div class="card-icon">
                            <i class="fas fa-chart-line"></i>
                        </div>
                        在庫推移 (直近30日)
                    </h3>
                    <div class="dropdown">
                        <button class="btn btn-outline-secondary btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <i class="fas fa-calendar"></i>
                            30日
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#" onclick="updateChart(7)">7日</a></li>
                            <li><a class="dropdown-item" href="#" onclick="updateChart(30)">30日</a></li>
                            <li><a class="dropdown-item" href="#" onclick="updateChart(90)">90日</a></li>
                        </ul>
                    </div>
                </div>
                <div class="card-content">
                    <div class="chart-container">
                        <canvas id="stockChart"></canvas>
                    </div>
                </div>
            </div>

            <!-- 最近の活動 -->
            <div class="dashboard-card">
                <div class="card-header">
                    <h3 class="card-title">
                        <div class="card-icon">
                            <i class="fas fa-history"></i>
                        </div>
                        最近の活動
                    </h3>
                    <a href="/transactions" class="btn btn-outline-secondary btn-sm">
                        <i class="fas fa-external-link-alt"></i>
                        すべて表示
                    </a>
                </div>
                <div class="card-content" style="padding: 0;">
                    <div class="activity-list" id="recentActivities">
                        <div class="loading">
                            <div class="spinner"></div>
                            データを読み込み中...
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 下部グリッド -->
        <div class="bottom-grid slide-up">
            <!-- 重要なお知らせ -->
            <div class="dashboard-card">
                <div class="card-header">
                    <h3 class="card-title">
                        <div class="card-icon">
                            <i class="fas fa-bell"></i>
                        </div>
                        重要なお知らせ
                        <span class="badge bg-danger" id="alertCount">0</span>
                    </h3>
                    <button class="btn btn-outline-secondary btn-sm" onclick="refreshAlerts()">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
                <div class="card-content">
                    <div class="alert-items" id="importantAlerts">
                        <div class="loading">
                            <div class="spinner"></div>
                            通知を読み込み中...
                        </div>
                    </div>
                </div>
            </div>

            <!-- クイック操作 -->
            <div class="dashboard-card">
                <div class="card-header">
                    <h3 class="card-title">
                        <div class="card-icon">
                            <i class="fas fa-bolt"></i>
                        </div>
                        クイック操作
                    </h3>
                </div>
                <div class="card-content">
                    <div class="quick-actions">
                        <a href="/stocks/new" class="quick-action-btn" sec:authorize="hasAnyRole('ADMIN','MANAGER','PHARMACIST')">
                            <div class="quick-action-icon success">
                                <i class="fas fa-plus"></i>
                            </div>
                            <div>
                                <div style="font-weight: 600;">在庫入庫</div>
                                <div style="font-size: 0.85rem; color: #64748b;">新規在庫追加</div>
                            </div>
                        </a>

                        <a href="/transactions/new?type=outbound" class="quick-action-btn" sec:authorize="hasAnyRole('ADMIN','MANAGER','PHARMACIST')">
                            <div class="quick-action-icon warning">
                                <i class="fas fa-minus"></i>
                            </div>
                            <div>
                                <div style="font-weight: 600;">在庫出庫</div>
                                <div style="font-size: 0.85rem; color: #64748b;">在庫使用処理</div>
                            </div>
                        </a>

                        <a href="/medicines/new" class="quick-action-btn" sec:authorize="hasAnyRole('ADMIN','MANAGER','PHARMACIST')">
                            <div class="quick-action-icon primary">
                                <i class="fas fa-pills"></i>
                            </div>
                            <div>
                                <div style="font-weight: 600;">医薬品登録</div>
                                <div style="font-size: 0.85rem; color: #64748b;">新規医薬品追加</div>
                            </div>
                        </a>

                        <a href="/stocks/audit" class="quick-action-btn" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
                            <div class="quick-action-icon info">
                                <i class="fas fa-clipboard-check"></i>
                            </div>
                            <div>
                                <div style="font-weight: 600;">在庫棚卸</div>
                                <div style="font-size: 0.85rem; color: #64748b;">在庫確認および調整</div>
                            </div>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="javascript">
    <script>
        // グローバル変数
        let stockChart = null;

        document.addEventListener('DOMContentLoaded', function() {
            initializeDashboard();
            loadDashboardData();
            initializeChart();
            updateDateTime();
        });

        // ダッシュボード初期化
        function initializeDashboard() {
            // 現在時刻の表示と自動更新
            setInterval(updateDateTime, 60000); // 1分ごとに更新

            // リアルタイムデータ更新 (任意)
            // setInterval(loadDashboardData, 300000); // 5分ごとに更新
        }

        // 現在時刻の更新
        function updateDateTime() {
            const now = new Date();
            const options = {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long',
                hour: '2-digit',
                minute: '2-digit'
            };
            document.getElementById('currentDateTime').textContent =
                '現在時刻: ' + now.toLocaleDateString('ja-JP', options);
        }

        // ダッシュボードデータロード
        async function loadDashboardData() {
            try {
                await Promise.all([
                    loadStatistics(),
                    loadRecentActivities(),
                    loadImportantAlerts()
                ]);
            } catch (error) {
                console.error('ダッシュボードデータのロードエラー:', error);
                showAlert('ダッシュボードデータの読み込み中にエラーが発生しました。', 'danger');
            }
        }

        // 統計データロード (セッションベース認証)
        async function loadStatistics() {
            try {
                const response = await fetch('/api/dashboard/summary', {
                    method: 'GET',
                    credentials: 'include', // セッションクッキーを含む
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const result = await response.json();
                    if (result.success) {
                        updateStatistics(result.data);
                    } else {
                        throw new Error(result.message);
                    }
                } else if (response.status === 401) {
                    window.location.href = '/login';
                } else {
                    throw new Error('統計データのロードに失敗しました');
                }
            } catch (error) {
                console.error('統計データのロードエラー:', error);
                // デフォルト値で代替
                updateStatistics({
                    totalMedicines: 0,
                    activeMedicines: 0,
                    totalStockItems: 0,
                    totalStockValue: 0.0,
                    todayInboundCount: 0,
                    todayOutboundCount: 0,
                    expiredCount: 0,
                    expiringSoonCount: 0
                });
            }
        }

        // 統計更新
        function updateStatistics(stats) {
            document.getElementById('totalMedicines').textContent = formatNumber(stats.totalMedicines || 0);
            document.getElementById('totalStocks').textContent = formatNumber(stats.totalStockItems || 0);

            // 在庫不足および期限関連データは別途APIから取得
            loadAlertCounts().then(alertData => {
                document.getElementById('lowStockItems').textContent = formatNumber(alertData.lowStockCount || 0);
                document.getElementById('expiringItems').textContent = formatNumber(alertData.expiringSoonCount || 0);
            });

            const totalTransactions = (stats.todayInboundCount || 0) + (stats.todayOutboundCount || 0);
            document.getElementById('todayTransactions').textContent = formatNumber(totalTransactions);

            // 変更情報の更新
            updateStatChanges(stats);
        }

        // 通知カウントのロード
        async function loadAlertCounts() {
            try {
                const response = await fetch('/api/dashboard/alerts', {
                    method: 'GET',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const result = await response.json();
                    return result.success ? result.data : {};
                }
            } catch (error) {
                console.error('通知カウントのロードエラー:', error);
            }
            return {};
        }

        // 最近の活動ロード
        async function loadRecentActivities() {
            try {
                const response = await fetch('/api/dashboard/recent-activities?limit=8', {
                    method: 'GET',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const result = await response.json();
                    if (result.success) {
                        renderRecentActivities(result.data);
                    } else {
                        throw new Error(result.message);
                    }
                } else {
                    throw new Error('最近の活動のロードに失敗しました');
                }
            } catch (error) {
                console.error('最近の活動のロードエラー:', error);
                renderRecentActivities([]);
            }
        }

        // 最近の活動レンダリング
        function renderRecentActivities(activities) {
            const container = document.getElementById('recentActivities');

            if (activities.length === 0) {
                container.innerHTML = `
                    <div class="activity-item" style="justify-content: center; text-align: center; color: #64748b;">
                        <i class="fas fa-info-circle me-2"></i>
                        最近の活動はありません。
                    </div>
                `;
                return;
            }

            container.innerHTML = activities.map(activity => `
                <div class="activity-item">
                    <div class="activity-icon ${activity.transactionType}">
                        <i class="fas fa-${getActivityIcon(activity.transactionType)}"></i>
                    </div>
                    <div class="activity-content">
                        <div class="activity-title">${activity.transactionTypeDescription || activity.transactionType}</div>
                        <div class="activity-description">${activity.medicineName} - ${formatNumber(activity.quantity)}個</div>
                        <div class="activity-time">${timeAgo(activity.transactionDate)}</div>
                    </div>
                </div>
            `).join('');
        }

        // 重要なお知らせロード
        async function loadImportantAlerts() {
            try {
                const response = await fetch('/api/dashboard/alerts', {
                    method: 'GET',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const result = await response.json();
                    if (result.success) {
                        renderImportantAlerts(result.data);
                    } else {
                        throw new Error(result.message);
                    }
                } else {
                    throw new Error('通知のロードに失敗しました');
                }
            } catch (error) {
                console.error('通知のロードエラー:', error);
                renderImportantAlerts({
                    criticalStockCount: 0,
                    lowStockCount: 0,
                    expiredCount: 0,
                    expiringSoonCount: 0,
                    quarantineCount: 0
                });
            }
        }

        // 重要なお知らせレンダリング
        function renderImportantAlerts(alerts) {
            const container = document.getElementById('importantAlerts');
            const alertCount = document.getElementById('alertCount');

            const alertItems = [];
            let totalAlerts = 0;

            if (alerts.criticalStockCount > 0) {
                alertItems.push({
                    type: 'danger',
                    title: '在庫切れ',
                    message: `${alerts.criticalStockCount}品目の医薬品の在庫が切れました。`
                });
                totalAlerts += alerts.criticalStockCount;
            }

            if (alerts.lowStockCount > 0) {
                alertItems.push({
                    type: 'warning',
                    title: '在庫不足警告',
                    message: `${alerts.lowStockCount}品目の医薬品の在庫が最小数量以下です。`
                });
                totalAlerts += alerts.lowStockCount;
            }

            if (alerts.expiredCount > 0) {
                alertItems.push({
                    type: 'danger',
                    title: '期限切れ在庫',
                    message: `${alerts.expiredCount}個の在庫が有効期限を超えました。`
                });
                totalAlerts += alerts.expiredCount;
            }

            if (alerts.expiringSoonCount > 0) {
                alertItems.push({
                    type: 'warning',
                    title: '有効期限間近',
                    message: `${alerts.expiringSoonCount}個の在庫が30日以内に期限切れになります。`
                });
                totalAlerts += alerts.expiringSoonCount;
            }

            alertCount.textContent = totalAlerts;

            if (alertItems.length === 0) {
                container.innerHTML = `
                    <div class="alert-item info">
                        <i class="fas fa-check-circle alert-icon info"></i>
                        <div class="alert-content">
                            <div class="alert-title">すべてのステータスは正常です</div>
                            <div class="alert-message">現在、注意が必要なお知らせはありません。</div>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = alertItems.map(alert => `
                <div class="alert-item ${alert.type}">
                    <i class="fas fa-${getAlertIcon(alert.type)} alert-icon ${alert.type}"></i>
                    <div class="alert-content">
                        <div class="alert-title">${alert.title}</div>
                        <div class="alert-message">${alert.message}</div>
                    </div>
                </div>
            `).join('');
        }

        // チャート初期化
        function initializeChart() {
            // Chart.jsがロードされていない場合はスキップ
            if (typeof Chart === 'undefined') {
                console.warn('Chart.jsがロードされていません。チャートをスキップします。');
                return;
            }

            const chartElement = document.getElementById('stockChart');
            if (!chartElement) {
                console.warn('チャート要素が見つかりません。');
                return;
            }

            try {
                const ctx = chartElement.getContext('2d');

                stockChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: [],
                        datasets: [{
                            label: '総在庫量',
                            data: [],
                            borderColor: 'rgb(44, 90, 160)',
                            backgroundColor: 'rgba(44, 90, 160, 0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4
                        }, {
                            label: '在庫不足',
                            data: [],
                            borderColor: 'rgb(245, 158, 11)',
                            backgroundColor: 'rgba(245, 158, 11, 0.1)',
                            borderWidth: 2,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'top',
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                grid: {
                                    color: '#f1f5f9'
                                }
                            },
                            x: {
                                grid: {
                                    color: '#f1f5f9'
                                }
                            }
                        }
                    }
                });

                loadChartData(30);
            } catch (error) {
                console.error('チャートの初期化エラー:', error);
            }
        }

        // チャートデータロード
        async function loadChartData(days) {
            try {
                // 実際の구현ではAPIからデータを取得する必要があります
                // 現在はダミーデータを使用
                const labels = [];
                const stockData = [];
                const lowStockData = [];
                const today = new Date();

                for (let i = days - 1; i >= 0; i--) {
                    const date = new Date(today.getTime() - i * 24 * 60 * 60 * 1000);
                    labels.push(date.toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' }));

                    // ダミーデータ (実際にはAPIから取得)
                    stockData.push(Math.floor(Math.random() * 1000) + 14000);
                    lowStockData.push(Math.floor(Math.random() * 15) + 5);
                }

                stockChart.data.labels = labels;
                stockChart.data.datasets[0].data = stockData;
                stockChart.data.datasets[1].data = lowStockData;
                stockChart.update();
            } catch (error) {
                console.error('チャートデータのロードエラー:', error);
            }
        }

        // ユーティリティ関数
        function getActivityIcon(type) {
            const icons = {
                'INBOUND': 'arrow-down',
                'OUTBOUND': 'arrow-up',
                'EXPIRED': 'exclamation-triangle',
                'ADJUSTMENT': 'edit'
            };
            return icons[type] || 'info';
        }

        function getAlertIcon(type) {
            const icons = {
                'warning': 'exclamation-triangle',
                'danger': 'times-circle',
                'info': 'info-circle'
            };
            return icons[type] || 'info-circle';
        }

        function updateStatChanges(stats) {
            // 変更情報は追加のAPI呼び出しやより複雑なロジックが必要
            // 現在は基本情報のみ表示
        }

        // イベントハンドラ
        function updateChart(days) {
            loadChartData(days);
        }

        function refreshAlerts() {
            loadImportantAlerts();
        }

        // キーボードショートカット
        document.addEventListener('keydown', function(e) {
            // F5: 更新
            if (e.key === 'F5') {
                e.preventDefault();
                loadDashboardData();
            }

            // Ctrl + N: 新規在庫入庫
            if (e.ctrlKey && e.key === 'n') {
                e.preventDefault();
                window.location.href = '/stocks/new';
            }
        });

        // ページ可視性変更時にデータ更新
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                loadDashboardData();
            }
        });
    </script>
