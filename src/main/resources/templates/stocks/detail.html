<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<div layout:fragment="content">

    <!-- Page Header -->
    <div class="page-header">
        <div>
            <h1 th:text="${stock.medicineName}">Medicine Name</h1>
            <p class="text-muted fs-5" th:text="'Lot No: ' + ${stock.lotNumber}">Lot No: L12345</p>
        </div>
        <div>
            <a th:href="@{/stocks/{id}/edit(id=${stock.id})}" class="btn btn-primary d-flex align-items-center">
                <i data-feather="edit-2" class="me-2"></i> Edit Stock
            </a>
            <a th:href="@{/stocks}" class="btn btn-outline-secondary">Back to List</a>
        </div>
    </div>

    <div class="card">
        <div class="card-header d-flex align-items-center">
            <i data-feather="layers" class="me-2"></i> Stock Details
        </div>
        <div class="card-body">
            <dl class="row">
                <dt class="col-sm-3">Stock ID</dt>
                <dd class="col-sm-9" th:text="${stock.id}">101</dd>

                <dt class="col-sm-3">Medicine</dt>
                <dd class="col-sm-9">
                    <a th:href="@{/medicines/{id}(id=${stock.medicineId})}" th:text="${stock.medicineName}">Aspirin</a>
                </dd>

                <dt class="col-sm-3">Quantity</dt>
                <dd class="col-sm-9 fw-bold" th:text="${stock.quantity}">100</dd>

                <dt class="col-sm-3">Status</dt>
                <dd class="col-sm-9">
                    <span class="badge fs-6" th:classappend="${stock.status.name() == 'AVAILABLE' ? 'bg-success-soft' : 'bg-secondary-soft'}" th:text="${stock.status.description}">Available</span>
                </dd>

                <dt class="col-sm-3">Expiry Date</dt>
                <dd class="col-sm-9" th:text="${#temporals.format(stock.expiryDate, 'yyyy-MM-dd')}">2024-12-31</dd>

                <dt class="col-sm-3">Inbound Date</dt>
                <dd class="col-sm-9" th:text="${#temporals.format(stock.inboundDate, 'yyyy-MM-dd')}">2023-01-01</dd>

                <dt class="col-sm-3">Location</dt>
                <dd class="col-sm-9" th:text="${stock.location}">Shelf A-1</dd>
            </dl>
        </div>
    </div>
</div>
</html>
