<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}">
<head>
    <title>재고 현황 - 의약품 재고관리 시스템</title>
</head>

<th:block layout:fragment="css">
    <style>
        /* 재고 목록 특화 스타일 */
        .stocks-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-header {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .page-title-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary-color), #1e40af);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }

        .page-subtitle {
            color: #64748b;
            font-size: 1.1rem;
            margin: 0;
        }

        /* 통계 카드 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .stat-card.active {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(44, 90, 160, 0.1);
        }

        .stat-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .stat-card-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
        }

        .stat-card-icon.total { background: linear-gradient(135deg, var(--primary-color), #1e40af); }
        .stat-card-icon.available { background: linear-gradient(135deg, var(--success-color), #059669); }
        .stat-card-icon.reserved { background: linear-gradient(135deg, var(--warning-color), #d97706); }
        .stat-card-icon.quarantine { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .stat-card-icon.expired { background: linear-gradient(135deg, var(--danger-color), #dc2626); }

        .stat-card-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--dark-color);
        }

        .stat-card-label {
            font-size: 0.9rem;
            color: #64748b;
            font-weight: 500;
        }

        /* 검색 및 필터 */
        .search-filter-card {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
        }

        .search-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--dark-color);
            font-size: 0.9rem;
        }

        .form-control {
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(44, 90, 160, 0.25);
            outline: none;
        }

        .form-select {
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(44, 90, 160, 0.25);
            outline: none;
        }

        .search-actions {
            display: flex;
            gap: 1rem;
            grid-column: 1 / -1;
            justify-content: flex-end;
            margin-top: 1rem;
        }

        .btn {
            border-radius: 12px;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), #1e40af);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(44, 90, 160, 0.3);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success-color), #059669);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
            color: white;
        }

        .btn-outline-secondary {
            background: white;
            border: 2px solid var(--border-color);
            color: var(--dark-color);
        }

        .btn-outline-secondary:hover {
            background: #f8fafc;
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        /* 재고 목록 */
        .stocks-list-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .list-header {
            padding: 2rem;
            border-bottom: 1px solid var(--border-color);
            background: #f8fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .list-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--dark-color);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .list-title-icon {
            width: 32px;
            height: 32px;
            background: rgba(44, 90, 160, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            font-size: 0.9rem;
        }

        .list-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .view-toggle {
            display: flex;
            background: white;
            border-radius: 8px;
            padding: 0.25rem;
            border: 1px solid var(--border-color);
        }

        .view-toggle-btn {
            padding: 0.5rem 1rem;
            border: none;
            background: transparent;
            border-radius: 6px;
            color: #64748b;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .view-toggle-btn.active {
            background: var(--primary-color);
            color: white;
        }

        /* 테이블 뷰 */
        .table-view {
            overflow-x: auto;
        }

        .stocks-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        .stocks-table th {
            background: #f8fafc;
            padding: 1.25rem 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--dark-color);
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .stocks-table td {
            padding: 1.25rem 1rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        .stocks-table tbody tr {
            transition: all 0.2s ease;
        }

        .stocks-table tbody tr:hover {
            background: rgba(44, 90, 160, 0.05);
            transform: scale(1.001);
        }

        .stocks-table tbody tr.selected {
            background: rgba(44, 90, 160, 0.1);
        }

        /* 카드 뷰 */
        .card-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
        }

        .stock-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .stock-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border-color: var(--primary-color);
        }

        .stock-card.selected {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(44, 90, 160, 0.1);
        }

        .stock-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .medicine-info {
            flex: 1;
        }

        .medicine-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--dark-color);
            margin-bottom: 0.25rem;
        }

        .medicine-code {
            font-family: 'Courier New', monospace;
            background: rgba(59, 130, 246, 0.1);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #1e40af;
            font-weight: 600;
        }

        .stock-card-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .stock-detail {
            display: flex;
            flex-direction: column;
        }

        .stock-detail-label {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 0.25rem;
        }

        .stock-detail-value {
            font-weight: 600;
            color: var(--dark-color);
        }

        .lot-number {
            font-family: 'Courier New', monospace;
            background: rgba(16, 185, 129, 0.1);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #065f46;
            font-weight: 600;
        }

        .quantity {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .quantity.low {
            color: var(--warning-color);
        }

        .quantity.critical {
            color: var(--danger-color);
        }

        .expiry-date {
            font-weight: 600;
        }

        .expiry-date.warning {
            color: var(--warning-color);
        }

        .expiry-date.danger {
            color: var(--danger-color);
        }

        /* 상태 배지 */
        .status-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .status-badge.available {
            background: rgba(16, 185, 129, 0.1);
            color: #065f46;
        }

        .status-badge.reserved {
            background: rgba(245, 158, 11, 0.1);
            color: #92400e;
        }

        .status-badge.quarantine {
            background: rgba(139, 92, 246, 0.1);
            color: #6d28d9;
        }

        .status-badge.expired {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }

        .status-badge.disposed {
            background: rgba(107, 114, 128, 0.1);
            color: #374151;
        }

        /* 일괄 작업 */
        .bulk-actions {
            background: #f8fafc;
            padding: 1rem 2rem;
            border-top: 1px solid var(--border-color);
            display: none;
            align-items: center;
            justify-content: space-between;
        }

        .bulk-actions.show {
            display: flex;
        }

        .bulk-info {
            color: #64748b;
            font-size: 0.9rem;
        }

        .bulk-buttons {
            display: flex;
            gap: 1rem;
        }

        /* 페이지네이션 */
        .pagination-container {
            padding: 2rem;
            border-top: 1px solid var(--border-color);
            background: #f8fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pagination-info {
            color: #64748b;
            font-size: 0.9rem;
        }

        .pagination {
            display: flex;
            gap: 0.5rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .pagination .page-item {
            display: block;
        }

        .pagination .page-link {
            display: block;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--dark-color);
            text-decoration: none;
            transition: all 0.2s ease;
            background: white;
        }

        .pagination .page-link:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .pagination .page-item.active .page-link {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .pagination .page-item.disabled .page-link {
            background: #f8fafc;
            color: #94a3b8;
            border-color: var(--border-color);
            cursor: not-allowed;
        }

        /* 빈 상태 */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #64748b;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: #cbd5e1;
        }

        .empty-state-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--dark-color);
        }

        .empty-state-description {
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        /* 로딩 상태 */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 반응형 디자인 */
        @media (max-width: 1024px) {
            .search-form {
                grid-template-columns: 1fr;
            }

            .search-actions {
                grid-column: 1;
                justify-content: stretch;
            }

            .search-actions .btn {
                flex: 1;
                justify-content: center;
            }

            .card-view {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .page-header,
            .search-filter-card,
            .list-header {
                padding: 1.5rem;
            }

            .page-title {
                font-size: 1.5rem;
                flex-direction: column;
                text-align: center;
                gap: 0.5rem;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .list-header {
                flex-direction: column;
                align-items: stretch;
            }

            .list-actions {
                justify-content: space-between;
            }

            .bulk-actions {
                flex-direction: column;
                gap: 1rem;
                align-items: stretch;
            }

            .bulk-buttons {
                justify-content: stretch;
            }

            .bulk-buttons .btn {
                flex: 1;
                justify-content: center;
            }

            .pagination-container {
                flex-direction: column;
                gap: 1rem;
            }

            .card-view {
                padding: 1rem;
            }

            .stock-card-body {
                grid-template-columns: 1fr;
            }
        }

        /* 페이드 인 애니메이션 */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="stocks-container">
        <!-- 페이지 헤더 -->
        <div class="page-header fade-in">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="page-title">
                        <div class="page-title-icon">
                            <i class="fas fa-warehouse"></i>
                        </div>
                        재고 현황
                    </h1>
                    <p class="page-subtitle">전체 의약품 재고 현황을 조회하고 관리할 수 있습니다.</p>
                </div>
                <div>
                    <a href="/stocks/new"
                       class="btn btn-success"
                       sec:authorize="hasAnyRole('ADMIN','MANAGER','PHARMACIST')">
                        <i class="fas fa-plus"></i>
                        재고 입고
                    </a>
                </div>
            </div>
        </div>

        <!-- 통계 카드 -->
        <div class="stats-grid fade-in" id="statsGrid">
            <!-- 동적으로 로드됨 -->
        </div>

        <!-- 검색 및 필터 -->
        <div class="search-filter-card fade-in">
            <form class="search-form" id="searchForm">
                <div class="form-group">
                    <label class="form-label" for="keyword">통합 검색</label>
                    <input type="text"
                           class="form-control"
                           id="keyword"
                           name="keyword"
                           placeholder="의약품명, 코드, 로트번호로 검색">
                </div>

                <div class="form-group">
                    <label class="form-label" for="medicineId">의약품</label>
                    <select class="form-select" id="medicineId" name="medicineId">
                        <option value="">전체 의약품</option>
                        <!-- 동적으로 로드됨 -->
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="status">재고 상태</label>
                    <select class="form-select" id="status" name="status">
                        <option value="">전체 상태</option>
                        <option value="AVAILABLE">사용 가능</option>
                        <option value="RESERVED">예약됨</option>
                        <option value="QUARANTINE">격리</option>
                        <option value="EXPIRED">만료</option>
                        <option value="DISPOSED">폐기</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="location">보관 위치</label>
                    <input type="text"
                           class="form-control"
                           id="location"
                           name="location"
                           placeholder="보관 위치">
                </div>

                <div class="form-group">
                    <label class="form-label" for="expiryFilter">유효기간</label>
                    <select class="form-select" id="expiryFilter" name="expiryFilter">
                        <option value="">전체</option>
                        <option value="expired">만료됨</option>
                        <option value="expiring_soon">30일 이내 만료</option>
                        <option value="expiring_week">7일 이내 만료</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="sortBy">정렬</label>
                    <select class="form-select" id="sortBy" name="sortBy">
                        <option value="id">등록순</option>
                        <option value="medicineName">의약품명</option>
                        <option value="expiryDate">유효기간</option>
                        <option value="quantity">수량</option>
                        <option value="receivedDate">입고일</option>
                    </select>
                </div>

                <div class="search-actions">
                    <button type="button" class="btn btn-outline-secondary" onclick="resetSearch()">
                        <i class="fas fa-undo"></i>
                        초기화
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-search"></i>
                        검색
                    </button>
                </div>
            </form>
        </div>

        <!-- 재고 목록 -->
        <div class="stocks-list-card fade-in" id="stocksContainer">
            <div class="list-header">
                <h2 class="list-title">
                    <div class="list-title-icon">
                        <i class="fas fa-list"></i>
                    </div>
                    재고 목록
                    <span class="badge bg-primary" id="totalCount">0</span>
                </h2>

                <div class="list-actions">
                    <div class="view-toggle">
                        <button class="view-toggle-btn active" data-view="table" onclick="switchView('table')">
                            <i class="fas fa-table"></i>
                            테이블
                        </button>
                        <button class="view-toggle-btn" data-view="card" onclick="switchView('card')">
                            <i class="fas fa-th-large"></i>
                            카드
                        </button>
                    </div>

                    <div class="dropdown">
                        <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <i class="fas fa-download"></i>
                            내보내기
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#" onclick="exportData('excel')">
                                <i class="fas fa-file-excel me-2"></i>Excel
                            </a></li>
                            <li><a class="dropdown-item" href="#" onclick="exportData('csv')">
                                <i class="fas fa-file-csv me-2"></i>CSV
                            </a></li>
                            <li><a class="dropdown-item" href="#" onclick="exportData('pdf')">
                                <i class="fas fa-file-pdf me-2"></i>PDF
                            </a></li>
                        </ul>
                    </div>

                    <button class="btn btn-outline-secondary" onclick="refreshData()">
                        <i class="fas fa-sync-alt"></i>
                        새로고침
                    </button>
                </div>
            </div>

            <!-- 테이블 뷰 -->
            <div class="table-view" id="tableView">
                <table class="stocks-table">
                    <thead>
                    <tr>
                        <th style="width: 50px;">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="selectAll" onchange="toggleSelectAll()">
                            </div>
                        </th>
                        <th>의약품</th>
                        <th>로트번호</th>
                        <th>수량</th>
                        <th>유효기간</th>
                        <th>입고일</th>
                        <th>보관위치</th>
                        <th>상태</th>
                        <th>작업</th>
                    </tr>
                    </thead>
                    <tbody id="stocksTableBody">
                    <!-- 동적으로 로드됨 -->
                    </tbody>
                </table>
            </div>

            <!-- 카드 뷰 -->
            <div class="card-view" id="cardView" style="display: none;">
                <!-- 동적으로 로드됨 -->
            </div>

            <!-- 빈 상태 -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-state-icon">
                    <i class="fas fa-box-open"></i>
                </div>
                <h3 class="empty-state-title">재고가 없습니다</h3>
                <p class="empty-state-description">검색 조건에 맞는 재고가 없거나 아직 재고가 등록되지 않았습니다.</p>
                <a href="/stocks/new"
                   class="btn btn-success"
                   sec:authorize="hasAnyRole('ADMIN','MANAGER','PHARMACIST')">
                    <i class="fas fa-plus"></i>
                    첫 재고 등록하기
                </a>
            </div>

            <!-- 일괄 작업 -->
            <div class="bulk-actions" id="bulkActions">
                <div class="bulk-info">
                    <span id="selectedCount">0</span>개 항목이 선택됨
                </div>
                <div class="bulk-buttons">
                    <button class="btn btn-outline-secondary" onclick="bulkUpdateLocation()">
                        <i class="fas fa-map-marker-alt"></i>
                        위치 변경
                    </button>
                    <button class="btn btn-outline-warning" onclick="bulkUpdateStatus()">
                        <i class="fas fa-edit"></i>
                        상태 변경
                    </button>
                    <button class="btn btn-outline-danger" onclick="bulkDispose()" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
                        <i class="fas fa-trash"></i>
                        일괄 폐기
                    </button>
                </div>
            </div>

            <!-- 페이지네이션 -->
            <div class="pagination-container" id="paginationContainer">
                <div class="pagination-info" id="paginationInfo">
                    <!-- 동적으로 업데이트됨 -->
                </div>
                <nav>
                    <ul class="pagination" id="pagination">
                        <!-- 동적으로 생성됨 -->
                    </ul>
                </nav>
            </div>

            <!-- 로딩 오버레이 -->
            <div class="loading-overlay" id="loadingOverlay" style="display: none;">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="javascript">
    <script>
        // 전역 변수
        let currentView = 'table';
        let currentPage = 0;
        let pageSize = 20;
        let totalElements = 0;
        let stocksData = [];
        let selectedStocks = new Set();
        let searchParams = {};

        document.addEventListener('DOMContentLoaded', function() {
            initializePage();
            loadInitialData();
            setupEventListeners();
        });

        // 페이지 초기화
        function initializePage() {
            loadMedicines();
            loadStatsData();
        }

        // 초기 데이터 로드
        function loadInitialData() {
            searchStocks();
        }

        // 이벤트 리스너 설정
        function setupEventListeners() {
            // 검색 폼 제출
            document.getElementById('searchForm').addEventListener('submit', function(e) {
                e.preventDefault();
                currentPage = 0;
                searchStocks();
            });

            // 실시간 검색 (디바운싱)
            let searchTimeout;
            document.getElementById('keyword').addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    currentPage = 0;
                    searchStocks();
                }, 500);
            });

            // 필터 변경 시 자동 검색
            const filterElements = ['medicineId', 'status', 'location', 'expiryFilter', 'sortBy'];
            filterElements.forEach(id => {
                document.getElementById(id).addEventListener('change', function() {
                    currentPage = 0;
                    searchStocks();
                });
            });
        }

        // 의약품 목록 로드
        async function loadMedicines() {
            try {
                const response = await ApiClient.get('/api/medicines?size=1000&sort=name');
                const select = document.getElementById('medicineId');

                if (response.content) {
                    response.content.forEach(medicine => {
                        const option = document.createElement('option');
                        option.value = medicine.id;
                        option.textContent = `${medicine.name} (${medicine.code})`;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('의약품 목록 로드 오류:', error);
            }
        }

        // 통계 데이터 로드
        async function loadStatsData() {
            try {
                const response = await ApiClient.get('/api/stocks/statistics/status');

                if (response.success) {
                    renderStatsCards(response.data);
                }
            } catch (error) {
                console.error('통계 데이터 로드 오류:', error);
                // 기본값으로 렌더링
                renderStatsCards({});
            }
        }

        // 통계 카드 렌더링
        function renderStatsCards(statsData) {
            const statsGrid = document.getElementById('statsGrid');

            const stats = [
                {
                    key: 'total',
                    icon: 'fas fa-boxes',
                    label: '전체 재고',
                    value: Object.values(statsData).reduce((sum, stat) => sum + (stat.count || 0), 0) || 0,
                    filter: ''
                },
                {
                    key: 'available',
                    icon: 'fas fa-check-circle',
                    label: '사용 가능',
                    value: statsData.AVAILABLE?.count || 0,
                    filter: 'AVAILABLE'
                },
                {
                    key: 'reserved',
                    icon: 'fas fa-clock',
                    label: '예약됨',
                    value: statsData.RESERVED?.count || 0,
                    filter: 'RESERVED'
                },
                {
                    key: 'quarantine',
                    icon: 'fas fa-shield-alt',
                    label: '격리',
                    value: statsData.QUARANTINE?.count || 0,
                    filter: 'QUARANTINE'
                },
                {
                    key: 'expired',
                    icon: 'fas fa-exclamation-triangle',
                    label: '만료/폐기',
                    value: (statsData.EXPIRED?.count || 0) + (statsData.DISPOSED?.count || 0),
                    filter: 'EXPIRED'
                }
            ];

            statsGrid.innerHTML = stats.map(stat => `
                <div class="stat-card" onclick="filterByStatus('${stat.filter}')" data-filter="${stat.filter}">
                    <div class="stat-card-header">
                        <div class="stat-card-icon ${stat.key}">
                            <i class="${stat.icon}"></i>
                        </div>
                    </div>
                    <div class="stat-card-value">${formatNumber(stat.value)}</div>
                    <div class="stat-card-label">${stat.label}</div>
                </div>
            `).join('');
        }

        // 재고 검색
        async function searchStocks() {
            showLoading(true);

            try {
                // 검색 파라미터 구성
                const formData = new FormData(document.getElementById('searchForm'));
                searchParams = {};

                for (let [key, value] of formData.entries()) {
                    if (value && value.trim() !== '') {
                        searchParams[key] = value;
                    }
                }

                // 유효기간 필터 처리
                if (searchParams.expiryFilter) {
                    switch (searchParams.expiryFilter) {
                        case 'expired':
                            searchParams.isExpired = true;
                            break;
                        case 'expiring_soon':
                            searchParams.daysUntilExpiry = 30;
                            break;
                        case 'expiring_week':
                            searchParams.daysUntilExpiry = 7;
                            break;
                    }
                    delete searchParams.expiryFilter;
                }

                // API 호출
                const queryString = new URLSearchParams({
                    page: currentPage,
                    size: pageSize,
                    sortBy: searchParams.sortBy || 'id',
                    direction: 'DESC'
                }).toString();

                const response = await ApiClient.post(`/api/stocks/search?${queryString}`, searchParams);

                if (response.success) {
                    stocksData = response.data.content || [];
                    totalElements = response.data.totalElements || 0;

                    renderStocksList();
                    renderPagination(response.data);
                    updateTotalCount();
                    clearSelection();
                }
            } catch (error) {
                console.error('재고 검색 오류:', error);
                showAlert('재고 데이터를 불러오는 중 오류가 발생했습니다.', 'danger');
                stocksData = [];
                renderStocksList();
            } finally {
                showLoading(false);
            }
        }

        // 재고 목록 렌더링
        function renderStocksList() {
            if (stocksData.length === 0) {
                showEmptyState();
                return;
            }

            hideEmptyState();

            if (currentView === 'table') {
                renderTableView();
            } else {
                renderCardView();
            }
        }

        // 테이블 뷰 렌더링
        function renderTableView() {
            const tbody = document.getElementById('stocksTableBody');

            tbody.innerHTML = stocksData.map(stock => `
                <tr class="${selectedStocks.has(stock.id) ? 'selected' : ''}" onclick="toggleRowSelection(${stock.id}, event)">
                    <td onclick="event.stopPropagation();">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="${stock.id}"
                                   ${selectedStocks.has(stock.id) ? 'checked' : ''}
                                   onchange="toggleStockSelection(${stock.id})">
                        </div>
                    </td>
                    <td>
                        <div>
                            <div style="font-weight: 600; color: var(--dark-color);">${stock.medicineName}</div>
                            <div style="font-size: 0.85rem; color: #64748b;">${stock.medicineCode}</div>
                        </div>
                    </td>
                    <td>
                        <span class="lot-number">${stock.lotNumber}</span>
                    </td>
                    <td>
                        <span class="quantity ${getQuantityClass(stock)}" style="font-size: 1.1rem; font-weight: 600;">
                            ${formatNumber(stock.quantity)}
                        </span>
                    </td>
                    <td>
                        <span class="expiry-date ${getExpiryClass(stock.daysUntilExpiry)}">
                            ${formatDate(stock.expiryDate)}
                            ${stock.daysUntilExpiry <= 30 ? `<br><small>(${stock.daysUntilExpiry}일 남음)</small>` : ''}
                        </span>
                    </td>
                    <td>${formatDate(stock.receivedDate)}</td>
                    <td>${stock.location || '-'}</td>
                    <td>
                        <span class="status-badge ${stock.status.toLowerCase()}">${stock.statusDescription}</span>
                    </td>
                    <td>
                        <div class="d-flex gap-1">
                            <button class="btn btn-outline-primary btn-sm" onclick="viewStock(${stock.id})" title="상세보기">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="btn btn-outline-warning btn-sm" onclick="editStock(${stock.id})" title="수정"
                                    ${!hasEditPermission() ? 'disabled' : ''}>
                                <i class="fas fa-edit"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // 카드 뷰 렌더링
        function renderCardView() {
            const cardView = document.getElementById('cardView');

            cardView.innerHTML = stocksData.map(stock => `
                <div class="stock-card ${selectedStocks.has(stock.id) ? 'selected' : ''}" onclick="toggleCardSelection(${stock.id})">
                    <div class="stock-card-header">
                        <div class="medicine-info">
                            <div class="medicine-name">${stock.medicineName}</div>
                            <span class="medicine-code">${stock.medicineCode}</span>
                        </div>
                        <div class="form-check" onclick="event.stopPropagation();">
                            <input class="form-check-input" type="checkbox" value="${stock.id}"
                                   ${selectedStocks.has(stock.id) ? 'checked' : ''}
                                   onchange="toggleStockSelection(${stock.id})">
                        </div>
                    </div>

                    <div class="stock-card-body">
                        <div class="stock-detail">
                            <div class="stock-detail-label">로트번호</div>
                            <div class="stock-detail-value">
                                <span class="lot-number">${stock.lotNumber}</span>
                            </div>
                        </div>
                        <div class="stock-detail">
                            <div class="stock-detail-label">수량</div>
                            <div class="stock-detail-value">
                                <span class="quantity ${getQuantityClass(stock)}">${formatNumber(stock.quantity)}</span>
                            </div>
                        </div>
                        <div class="stock-detail">
                            <div class="stock-detail-label">유효기간</div>
                            <div class="stock-detail-value">
                                <span class="expiry-date ${getExpiryClass(stock.daysUntilExpiry)}">
                                    ${formatDate(stock.expiryDate)}
                                </span>
                                ${stock.daysUntilExpiry <= 30 ? `<div style="font-size: 0.8rem; color: #f59e0b;">${stock.daysUntilExpiry}일 남음</div>` : ''}
                            </div>
                        </div>
                        <div class="stock-detail">
                            <div class="stock-detail-label">보관위치</div>
                            <div class="stock-detail-value">${stock.location || '-'}</div>
                        </div>
                    </div>

                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span class="status-badge ${stock.status.toLowerCase()}">${stock.statusDescription}</span>
                        <div class="d-flex gap-1">
                            <button class="btn btn-outline-primary btn-sm" onclick="viewStock(${stock.id}); event.stopPropagation();" title="상세보기">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="btn btn-outline-warning btn-sm" onclick="editStock(${stock.id}); event.stopPropagation();" title="수정"
                                    ${!hasEditPermission() ? 'disabled' : ''}>
                                <i class="fas fa-edit"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 페이지네이션 렌더링
        function renderPagination(pageData) {
            const pagination = document.getElementById('pagination');
            const totalPages = pageData.totalPages || 0;

            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let paginationHTML = '';

            // 첫 페이지
            paginationHTML += `
                <li class="page-item ${currentPage === 0 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="goToPage(0); return false;">
                        <i class="fas fa-angle-double-left"></i>
                    </a>
                </li>
            `;

            // 이전 페이지
            paginationHTML += `
                <li class="page-item ${currentPage === 0 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="goToPage(${currentPage - 1}); return false;">
                        <i class="fas fa-angle-left"></i>
                    </a>
                </li>
            `;

            // 페이지 번호들
            const startPage = Math.max(0, currentPage - 2);
            const endPage = Math.min(totalPages - 1, currentPage + 2);

            for (let i = startPage; i <= endPage; i++) {
                paginationHTML += `
                    <li class="page-item ${i === currentPage ? 'active' : ''}">
                        <a class="page-link" href="#" onclick="goToPage(${i}); return false;">
                            ${i + 1}
                        </a>
                    </li>
                `;
            }

            // 다음 페이지
            paginationHTML += `
                <li class="page-item ${currentPage >= totalPages - 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="goToPage(${currentPage + 1}); return false;">
                        <i class="fas fa-angle-right"></i>
                    </a>
                </li>
            `;

            // 마지막 페이지
            paginationHTML += `
                <li class="page-item ${currentPage >= totalPages - 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="goToPage(${totalPages - 1}); return false;">
                        <i class="fas fa-angle-double-right"></i>
                    </a>
                </li>
            `;

            pagination.innerHTML = paginationHTML;

            // 페이지네이션 정보 업데이트
            const start = currentPage * pageSize + 1;
            const end = Math.min((currentPage + 1) * pageSize, totalElements);
            document.getElementById('paginationInfo').textContent =
                `총 ${formatNumber(totalElements)}개 중 ${formatNumber(start)}-${formatNumber(end)}개 표시`;
        }

        // 유틸리티 함수들
        function getQuantityClass(stock) {
            // 실제 구현에서는 의약품의 최소 재고량과 비교
            if (stock.quantity <= 10) return 'critical';
            if (stock.quantity <= 30) return 'low';
            return '';
        }

        function getExpiryClass(daysUntilExpiry) {
            if (daysUntilExpiry <= 0) return 'danger';
            if (daysUntilExpiry <= 30) return 'warning';
            return '';
        }

        function hasEditPermission() {
            // 실제 구현에서는 사용자 권한 확인
            return true; // 임시
        }

        function updateTotalCount() {
            document.getElementById('totalCount').textContent = formatNumber(totalElements);
        }

        function showEmptyState() {
            document.getElementById('emptyState').style.display = 'block';
            document.getElementById('tableView').style.display = 'none';
            document.getElementById('cardView').style.display = 'none';
            document.getElementById('paginationContainer').style.display = 'none';
        }

        function hideEmptyState() {
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('paginationContainer').style.display = 'flex';

            if (currentView === 'table') {
                document.getElementById('tableView').style.display = 'block';
                document.getElementById('cardView').style.display = 'none';
            } else {
                document.getElementById('tableView').style.display = 'none';
                document.getElementById('cardView').style.display = 'block';
            }
        }

        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = show ? 'flex' : 'none';
        }

        // 이벤트 핸들러들
        function switchView(view) {
            currentView = view;

            // 토글 버튼 상태 업데이트
            document.querySelectorAll('.view-toggle-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.view === view) {
                    btn.classList.add('active');
                }
            });

            renderStocksList();
        }

        function filterByStatus(status) {
            // 통계 카드 활성 상태 업데이트
            document.querySelectorAll('.stat-card').forEach(card => {
                card.classList.remove('active');
                if (card.dataset.filter === status) {
                    card.classList.add('active');
                }
            });

            // 필터 적용
            document.getElementById('status').value = status;
            currentPage = 0;
            searchStocks();
        }

        function resetSearch() {
            document.getElementById('searchForm').reset();

            // 통계 카드 활성 상태 초기화
            document.querySelectorAll('.stat-card').forEach(card => {
                card.classList.remove('active');
            });

            currentPage = 0;
            searchParams = {};
            searchStocks();
        }

        function refreshData() {
            loadStatsData();
            searchStocks();
        }

        function goToPage(page) {
            currentPage = page;
            searchStocks();
        }

        // 선택 관련 함수들
        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('input[type="checkbox"][value]');

            if (selectAll.checked) {
                stocksData.forEach(stock => selectedStocks.add(stock.id));
                checkboxes.forEach(cb => cb.checked = true);
            } else {
                selectedStocks.clear();
                checkboxes.forEach(cb => cb.checked = false);
            }

            updateBulkActions();
            updateRowSelection();
        }

        function toggleStockSelection(stockId) {
            if (selectedStocks.has(stockId)) {
                selectedStocks.delete(stockId);
            } else {
                selectedStocks.add(stockId);
            }

            updateBulkActions();
            updateRowSelection();
        }

        function toggleRowSelection(stockId, event) {
            if (event.target.type !== 'checkbox') {
                toggleStockSelection(stockId);
                const checkbox = document.querySelector(`input[value="${stockId}"]`);
                if (checkbox) {
                    checkbox.checked = selectedStocks.has(stockId);
                }
            }
        }

        function toggleCardSelection(stockId) {
            toggleStockSelection(stockId);
            const checkbox = document.querySelector(`input[value="${stockId}"]`);
            if (checkbox) {
                checkbox.checked = selectedStocks.has(stockId);
            }
        }

        function updateRowSelection() {
            // 테이블 행 선택 상태 업데이트
            document.querySelectorAll('tbody tr').forEach(row => {
                const checkbox = row.querySelector('input[type="checkbox"]');
                if (checkbox && selectedStocks.has(parseInt(checkbox.value))) {
                    row.classList.add('selected');
                } else {
                    row.classList.remove('selected');
                }
            });

            // 카드 선택 상태 업데이트
            document.querySelectorAll('.stock-card').forEach(card => {
                const checkbox = card.querySelector('input[type="checkbox"]');
                if (checkbox && selectedStocks.has(parseInt(checkbox.value))) {
                    card.classList.add('selected');
                } else {
                    card.classList.remove('selected');
                }
            });
        }

        function updateBulkActions() {
            const bulkActions = document.getElementById('bulkActions');
            const selectedCount = document.getElementById('selectedCount');
            const selectAll = document.getElementById('selectAll');

            selectedCount.textContent = selectedStocks.size;

            if (selectedStocks.size > 0) {
                bulkActions.classList.add('show');
            } else {
                bulkActions.classList.remove('show');
            }

            // 전체 선택 체크박스 상태 업데이트
            if (selectedStocks.size === 0) {
                selectAll.indeterminate = false;
                selectAll.checked = false;
            } else if (selectedStocks.size === stocksData.length) {
                selectAll.indeterminate = false;
                selectAll.checked = true;
            } else {
                selectAll.indeterminate = true;
                selectAll.checked = false;
            }
        }

        function clearSelection() {
            selectedStocks.clear();
            updateBulkActions();

            // 모든 체크박스 해제
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);

            // 선택 상태 제거
            document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
        }

        // 액션 함수들
        function viewStock(stockId) {
            window.location.href = `/stocks/${stockId}`;
        }

        function editStock(stockId) {
            window.location.href = `/stocks/${stockId}/edit`;
        }

        function exportData(format) {
            const params = new URLSearchParams(searchParams);
            params.append('format', format);
            window.open(`/api/stocks/export?${params.toString()}`, '_blank');
        }

        // 일괄 작업 함수들
        async function bulkUpdateLocation() {
            if (selectedStocks.size === 0) return;

            const newLocation = prompt('새로운 보관 위치를 입력하세요:');
            if (!newLocation) return;

            try {
                const response = await ApiClient.put('/api/stocks/batch', {
                    stockIds: Array.from(selectedStocks),
                    operation: 'UPDATE_LOCATION',
                    location: newLocation
                });

                if (response.success) {
                    showAlert(`${response.data.updatedCount}개 재고의 위치가 변경되었습니다.`, 'success');
                    refreshData();
                    clearSelection();
                }
            } catch (error) {
                showAlert('위치 변경 중 오류가 발생했습니다.', 'danger');
            }
        }

        async function bulkUpdateStatus() {
            if (selectedStocks.size === 0) return;

            const newStatus = prompt('새로운 상태를 입력하세요 (AVAILABLE, RESERVED, QUARANTINE, EXPIRED):');
            if (!newStatus) return;

            try {
                const response = await ApiClient.put('/api/stocks/batch', {
                    stockIds: Array.from(selectedStocks),
                    operation: 'UPDATE_STATUS',
                    status: newStatus
                });

                if (response.success) {
                    showAlert(`${response.data.updatedCount}개 재고의 상태가 변경되었습니다.`, 'success');
                    refreshData();
                    clearSelection();
                }
            } catch (error) {
                showAlert('상태 변경 중 오류가 발생했습니다.', 'danger');
            }
        }

        async function bulkDispose() {
            if (selectedStocks.size === 0) return;

            if (!confirm(`선택된 ${selectedStocks.size}개 재고를 폐기 처리하시겠습니까?`)) return;

            try {
                const response = await ApiClient.put('/api/stocks/batch', {
                    stockIds: Array.from(selectedStocks),
                    operation: 'DISPOSE'
                });

                if (response.success) {
                    showAlert(`${response.data.updatedCount}개 재고가 폐기 처리되었습니다.`, 'success');
                    refreshData();
                    clearSelection();
                }
            } catch (error) {
                showAlert('폐기 처리 중 오류가 발생했습니다.', 'danger');
            }
        }

        // 키보드 단축키
        document.addEventListener('keydown', function(e) {
            // Ctrl + A: 전체 선택
            if (e.ctrlKey && e.key === 'a' && e.target.tagName !== 'INPUT') {
                e.preventDefault();
                document.getElementById('selectAll').click();
            }

            // F5: 새로고침
            if (e.key === 'F5') {
                e.preventDefault();
                refreshData();
            }

            // Ctrl + F: 검색 필드 포커스
            if (e.ctrlKey && e.key === 'f') {
                e.preventDefault();
                document.getElementById('keyword').focus();
            }

            // Escape: 선택 해제
            if (e.key === 'Escape') {
                clearSelection();
            }
        });
    </script>
</th:block>
