<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}">
<head>
    <title>在庫状況 - 医薬品在庫管理システム</title>
</head>

<th:block layout:fragment="css">
    <style>
        /* 在庫リスト特化スタイル */
        .stocks-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-header {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .page-title-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary-color), #1e40af);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }

        .page-subtitle {
            color: #64748b;
            font-size: 1.1rem;
            margin: 0;
        }

        /* 統計カード */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .stat-card.active {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(44, 90, 160, 0.1);
        }

        .stat-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .stat-card-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: white;
        }

        .stat-card-icon.total { background: linear-gradient(135deg, var(--primary-color), #1e40af); }
        .stat-card-icon.available { background: linear-gradient(135deg, var(--success-color), #059669); }
        .stat-card-icon.reserved { background: linear-gradient(135deg, var(--warning-color), #d97706); }
        .stat-card-icon.quarantine { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        .stat-card-icon.expired { background: linear-gradient(135deg, var(--danger-color), #dc2626); }

        .stat-card-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--dark-color);
        }

        .stat-card-label {
            font-size: 0.9rem;
            color: #64748b;
            font-weight: 500;
        }

        /* 検索・フィルター */
        .search-filter-card {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
        }

        .search-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--dark-color);
            font-size: 0.9rem;
        }

        .form-control {
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(44, 90, 160, 0.25);
            outline: none;
        }

        .form-select {
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(44, 90, 160, 0.25);
            outline: none;
        }

        .search-actions {
            display: flex;
            gap: 1rem;
            grid-column: 1 / -1;
            justify-content: flex-end;
            margin-top: 1rem;
        }

        .btn {
            border-radius: 12px;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), #1e40af);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(44, 90, 160, 0.3);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success-color), #059669);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
            color: white;
        }

        .btn-outline-secondary {
            background: white;
            border: 2px solid var(--border-color);
            color: var(--dark-color);
        }

        .btn-outline-secondary:hover {
            background: #f8fafc;
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        /* 在庫リスト */
        .stocks-list-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .list-header {
            padding: 2rem;
            border-bottom: 1px solid var(--border-color);
            background: #f8fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .list-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--dark-color);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .list-title-icon {
            width: 32px;
            height: 32px;
            background: rgba(44, 90, 160, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            font-size: 0.9rem;
        }

        .list-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .view-toggle {
            display: flex;
            background: white;
            border-radius: 8px;
            padding: 0.25rem;
            border: 1px solid var(--border-color);
        }

        .view-toggle-btn {
            padding: 0.5rem 1rem;
            border: none;
            background: transparent;
            border-radius: 6px;
            color: #64748b;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .view-toggle-btn.active {
            background: var(--primary-color);
            color: white;
        }

        /* テーブルビュー */
        .table-view {
            overflow-x: auto;
        }

        .stocks-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        .stocks-table th {
            background: #f8fafc;
            padding: 1.25rem 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--dark-color);
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .stocks-table td {
            padding: 1.25rem 1rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        .stocks-table tbody tr {
            transition: all 0.2s ease;
        }

        .stocks-table tbody tr:hover {
            background: rgba(44, 90, 160, 0.05);
            transform: scale(1.001);
        }

        .stocks-table tbody tr.selected {
            background: rgba(44, 90, 160, 0.1);
        }

        /* カードビュー */
        .card-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
        }

        .stock-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .stock-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            border-color: var(--primary-color);
        }

        .stock-card.selected {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(44, 90, 160, 0.1);
        }

        .stock-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .medicine-info {
            flex: 1;
        }

        .medicine-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--dark-color);
            margin-bottom: 0.25rem;
        }

        .medicine-code {
            font-family: 'Courier New', monospace;
            background: rgba(59, 130, 246, 0.1);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #1e40af;
            font-weight: 600;
        }

        .stock-card-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .stock-detail {
            display: flex;
            flex-direction: column;
        }

        .stock-detail-label {
            font-size: 0.8rem;
            color: #64748b;
            margin-bottom: 0.25rem;
        }

        .stock-detail-value {
            font-weight: 600;
            color: var(--dark-color);
        }

        .lot-number {
            font-family: 'Courier New', monospace;
            background: rgba(16, 185, 129, 0.1);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #065f46;
            font-weight: 600;
        }

        .quantity {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .quantity.low {
            color: var(--warning-color);
        }

        .quantity.critical {
            color: var(--danger-color);
        }

        .expiry-date {
            font-weight: 600;
        }

        .expiry-date.warning {
            color: var(--warning-color);
        }

        .expiry-date.danger {
            color: var(--danger-color);
        }

        /* ステータスバッジ */
        .status-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .status-badge.available {
            background: rgba(16, 185, 129, 0.1);
            color: #065f46;
        }

        .status-badge.reserved {
            background: rgba(245, 158, 11, 0.1);
            color: #92400e;
        }

        .status-badge.quarantine {
            background: rgba(139, 92, 246, 0.1);
            color: #6d28d9;
        }

        .status-badge.expired {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }

        .status-badge.disposed {
            background: rgba(107, 114, 128, 0.1);
            color: #374151;
        }

        /* 一括操作 */
        .bulk-actions {
            background: #f8fafc;
            padding: 1rem 2rem;
            border-top: 1px solid var(--border-color);
            display: none;
            align-items: center;
            justify-content: space-between;
        }

        .bulk-actions.show {
            display: flex;
        }

        .bulk-info {
            color: #64748b;
            font-size: 0.9rem;
        }

        .bulk-buttons {
            display: flex;
            gap: 1rem;
        }

        /* ページネーション */
        .pagination-container {
            padding: 2rem;
            border-top: 1px solid var(--border-color);
            background: #f8fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pagination-info {
            color: #64748b;
            font-size: 0.9rem;
        }

        .pagination {
            display: flex;
            gap: 0.5rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .pagination .page-item {
            display: block;
        }

        .pagination .page-link {
            display: block;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--dark-color);
            text-decoration: none;
            transition: all 0.2s ease;
            background: white;
        }

        .pagination .page-link:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .pagination .page-item.active .page-link {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .pagination .page-item.disabled .page-link {
            background: #f8fafc;
            color: #94a3b8;
            border-color: var(--border-color);
            cursor: not-allowed;
        }

        /* 空の状態 */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #64748b;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: #cbd5e1;
        }

        .empty-state-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--dark-color);
        }

        .empty-state-description {
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        /* ローディング状態 */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* レスポンシブデザイン */
        @media (max-width: 1024px) {
            .search-form {
                grid-template-columns: 1fr;
            }

            .search-actions {
                grid-column: 1;
                justify-content: stretch;
            }

            .search-actions .btn {
                flex: 1;
                justify-content: center;
            }

            .card-view {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .page-header,
            .search-filter-card,
            .list-header {
                padding: 1.5rem;
            }

            .page-title {
                font-size: 1.5rem;
                flex-direction: column;
                text-align: center;
                gap: 0.5rem;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .list-header {
                flex-direction: column;
                align-items: stretch;
            }

            .list-actions {
                justify-content: space-between;
            }

            .bulk-actions {
                flex-direction: column;
                gap: 1rem;
                align-items: stretch;
            }

            .bulk-buttons {
                justify-content: stretch;
            }

            .bulk-buttons .btn {
                flex: 1;
                justify-content: center;
            }

            .pagination-container {
                flex-direction: column;
                gap: 1rem;
            }

            .card-view {
                padding: 1rem;
            }

            .stock-card-body {
                grid-template-columns: 1fr;
            }
        }

        /* フェードインアニメーション */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</th:block>

<div layout:fragment="content">
    <div class="stocks-container">
        <div class="page-header fade-in">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="page-title">
                        <div class="page-title-icon">
                            <i class="fas fa-warehouse"></i>
                        </div>
                        在庫状況
                    </h1>
                    <p class="page-subtitle">全医薬品の在庫状況を照会し、管理することができます。</p>
                </div>
                <div>
                    <a href="/stocks/inbound"
                       class="btn btn-success"
                       sec:authorize="hasAnyRole('ADMIN','MANAGER','PHARMACIST')">
                        <i class="fas fa-plus"></i>
                        在庫入庫
                    </a>
                </div>
            </div>
        </div>

        <div class="stats-grid fade-in" id="statsGrid">
        </div>

        <div class="search-filter-card fade-in">
            <form class="search-form" id="searchForm">
                <div class="form-group">
                    <label class="form-label" for="keyword">統合検索</label>
                    <input type="text"
                           class="form-control"
                           id="keyword"
                           name="keyword"
                           placeholder="医薬品名、コード、ロット番号で検索">
                </div>

                <div class="form-group">
                    <label class="form-label" for="medicineId">医薬品</label>
                    <select class="form-select" id="medicineId" name="medicineId">
                        <option value="">すべての医薬品</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="status">在庫ステータス</label>
                    <select class="form-select" id="status" name="status">
                        <option value="">すべてのステータス</option>
                        <option value="AVAILABLE">利用可能</option>
                        <option value="RESERVED">予約済み</option>
                        <option value="QUARANTINE">隔離</option>
                        <option value="EXPIRED">期限切れ</option>
                        <option value="DISPOSED">廃棄</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="location">保管場所</label>
                    <input type="text"
                           class="form-control"
                           id="location"
                           name="location"
                           placeholder="保管場所">
                </div>

                <div class="form-group">
                    <label class="form-label" for="expiryFilter">使用期限</label>
                    <select class="form-select" id="expiryFilter" name="expiryFilter">
                        <option value="">すべて</option>
                        <option value="expired">期限切れ</option>
                        <option value="expiring_soon">30日以内に期限切れ</option>
                        <option value="expiring_week">7日以内に期限切れ</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="sortBy">並び替え</label>
                    <select class="form-select" id="sortBy" name="sortBy">
                        <option value="id">登録順</option>
                        <option value="medicineName">医薬品名</option>
                        <option value="expiryDate">使用期限</option>
                        <option value="quantity">数量</option>
                        <option value="receivedDate">入庫日</option>
                    </select>
                </div>

                <div class="search-actions">
                    <button type="button" class="btn btn-outline-secondary" onclick="resetSearch()">
                        <i class="fas fa-undo"></i>
                        リセット
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-search"></i>
                        検索
                    </button>
                </div>
            </form>
        </div>

        <div class="stocks-list-card fade-in" id="stocksContainer">
            <div class="list-header">
                <h2 class="list-title">
                    <div class="list-title-icon">
                        <i class="fas fa-list"></i>
                    </div>
                    在庫一覧
                    <span class="badge bg-primary" id="totalCount">0</span>
                </h2>

                <div class="list-actions">
                    <div class="view-toggle">
                        <button class="view-toggle-btn active" data-view="table" onclick="switchView('table')">
                            <i class="fas fa-table"></i>
                            テーブル
                        </button>
                        <button class="view-toggle-btn" data-view="card" onclick="switchView('card')">
                            <i class="fas fa-th-large"></i>
                            カード
                        </button>
                    </div>

                    <div class="dropdown">
                        <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                            <i class="fas fa-download"></i>
                            エクスポート
                        </button>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#" onclick="exportData('excel')">
                                <i class="fas fa-file-excel me-2"></i>Excel
                            </a></li>
                            <li><a class="dropdown-item" href="#" onclick="exportData('csv')">
                                <i class="fas fa-file-csv me-2"></i>CSV
                            </a></li>
                            <li><a class="dropdown-item" href="#" onclick="exportData('pdf')">
                                <i class="fas fa-file-pdf me-2"></i>PDF
                            </a></li>
                        </ul>
                    </div>

                    <button class="btn btn-outline-secondary" onclick="refreshData()">
                        <i class="fas fa-sync-alt"></i>
                        更新
                    </button>
                </div>
            </div>

            <div class="table-view" id="tableView">
                <table class="stocks-table">
                    <thead>
                    <tr>
                        <th style="width: 50px;">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="selectAll" onchange="toggleSelectAll()">
                            </div>
                        </th>
                        <th>医薬品</th>
                        <th>ロット番号</th>
                        <th>数量</th>
                        <th>使用期限</th>
                        <th>入庫日</th>
                        <th>保管場所</th>
                        <th>ステータス</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="stocksTableBody">
                    </tbody>
                </table>
            </div>

            <div class="card-view" id="cardView" style="display: none;">
            </div>

            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-state-icon">
                    <i class="fas fa-box-open"></i>
                </div>
                <h3 class="empty-state-title">在庫がありません</h3>
                <p class="empty-state-description">検索条件に合う在庫がないか、まだ在庫が登録されていません。</p>
                <a href="/stocks/inbound"
                   class="btn btn-success"
                   sec:authorize="hasAnyRole('ADMIN','MANAGER','PHARMACIST')">
                    <i class="fas fa-plus"></i>
                    最初の在庫を登録する
                </a>
            </div>

            <div class="bulk-actions" id="bulkActions">
                <div class="bulk-info">
                    <span id="selectedCount">0</span>件の項目が選択されています
                </div>
                <div class="bulk-buttons">
                    <button class="btn btn-outline-secondary" onclick="bulkUpdateLocation()">
                        <i class="fas fa-map-marker-alt"></i>
                        場所変更
                    </button>
                    <button class="btn btn-outline-warning" onclick="bulkUpdateStatus()">
                        <i class="fas fa-edit"></i>
                        ステータス変更
                    </button>
                    <button class="btn btn-outline-danger" onclick="bulkDispose()" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
                        <i class="fas fa-trash"></i>
                        一括廃棄
                    </button>
                </div>
            </div>

            <div class="pagination-container" id="paginationContainer">
                <div class="pagination-info" id="paginationInfo">
                </div>
                <nav>
                    <ul class="pagination" id="pagination">
                    </ul>
                </nav>
            </div>

            <div class="loading-overlay" id="loadingOverlay" style="display: none;">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>
</div>

<th:block layout:fragment="javascript">
    <script>
        // グローバル変数
        let currentView = 'table';
        let currentPage = 0;
        let pageSize = 20;
        let totalElements = 0;
        let stocksData = [];
        let selectedStocks = new Set();
        let searchParams = {};

        document.addEventListener('DOMContentLoaded', function() {
            initializePage();
            loadInitialData();
            setupEventListeners();
        });

        // ページ初期化
        function initializePage() {
            loadMedicines();
            loadStatsData();
        }

        // 初期データロード
        function loadInitialData() {
            searchStocks();
        }

        // イベントリスナー設定
        function setupEventListeners() {
            // 検索フォーム送信
            document.getElementById('searchForm').addEventListener('submit', function(e) {
                e.preventDefault();
                currentPage = 0;
                searchStocks();
            });

            // リアルタイム検索 (デバウンス)
            let searchTimeout;
            document.getElementById('keyword').addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    currentPage = 0;
                    searchStocks();
                }, 500);
            });

            // フィルター変更時に自動検索
            const filterElements = ['medicineId', 'status', 'location', 'expiryFilter', 'sortBy'];
            filterElements.forEach(id => {
                document.getElementById(id).addEventListener('change', function() {
                    currentPage = 0;
                    searchStocks();
                });
            });
        }

        // 医薬品リストのロード
        async function loadMedicines() {
            try {
                const response = await ApiClient.get('/api/medicines?size=1000&sort=name');
                const select = document.getElementById('medicineId');

                if (response.content) {
                    response.content.forEach(medicine => {
                        const option = document.createElement('option');
                        option.value = medicine.id;
                        option.textContent = `${medicine.name} (${medicine.code})`;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('医薬品リストのロードエラー:', error);
            }
        }

        // 統計データのロード
        async function loadStatsData() {
            try {
                const response = await ApiClient.get('/api/stocks/statistics/status');

                if (response.success) {
                    renderStatsCards(response.data);
                }
            } catch (error) {
                console.error('統計データのロードエラー:', error);
                // デフォルト値でレンダリング
                renderStatsCards({});
            }
        }

        // 統計カードのレンダリング
        function renderStatsCards(statsData) {
            const statsGrid = document.getElementById('statsGrid');

            const stats = [
                {
                    key: 'total',
                    icon: 'fas fa-boxes',
                    label: '総在庫',
                    value: Object.values(statsData).reduce((sum, stat) => sum + (stat.count || 0), 0) || 0,
                    filter: ''
                },
                {
                    key: 'available',
                    icon: 'fas fa-check-circle',
                    label: '利用可能',
                    value: statsData.AVAILABLE?.count || 0,
                    filter: 'AVAILABLE'
                },
                {
                    key: 'reserved',
                    icon: 'fas fa-clock',
                    label: '予約済み',
                    value: statsData.RESERVED?.count || 0,
                    filter: 'RESERVED'
                },
                {
                    key: 'quarantine',
                    icon: 'fas fa-shield-alt',
                    label: '隔離',
                    value: statsData.QUARANTINE?.count || 0,
                    filter: 'QUARANTINE'
                },
                {
                    key: 'expired',
                    icon: 'fas fa-exclamation-triangle',
                    label: '期限切れ/廃棄',
                    value: (statsData.EXPIRED?.count || 0) + (statsData.DISPOSED?.count || 0),
                    filter: 'EXPIRED'
                }
            ];

            statsGrid.innerHTML = stats.map(stat => `
                <div class="stat-card" onclick="filterByStatus('${stat.filter}')" data-filter="${stat.filter}">
                    <div class="stat-card-header">
                        <div class="stat-card-icon ${stat.key}">
                            <i class="${stat.icon}"></i>
                        </div>
                    </div>
                    <div class="stat-card-value">${formatNumber(stat.value)}</div>
                    <div class="stat-card-label">${stat.label}</div>
                </div>
            `).join('');
        }

        // 在庫検索
        async function searchStocks() {
            showLoading(true);

            try {
                // 検索パラメータの構成
                const formData = new FormData(document.getElementById('searchForm'));
                searchParams = {};

                for (let [key, value] of formData.entries()) {
                    if (value && value.trim() !== '') {
                        searchParams[key] = value;
                    }
                }

                // 使用期限フィルター処理
                if (searchParams.expiryFilter) {
                    switch (searchParams.expiryFilter) {
                        case 'expired':
                            searchParams.isExpired = true;
                            break;
                        case 'expiring_soon':
                            searchParams.daysUntilExpiry = 30;
                            break;
                        case 'expiring_week':
                            searchParams.daysUntilExpiry = 7;
                            break;
                    }
                    delete searchParams.expiryFilter;
                }

                // API呼び出し
                const queryString = new URLSearchParams({
                    page: currentPage,
                    size: pageSize,
                    sortBy: searchParams.sortBy || 'id',
                    direction: 'DESC'
                }).toString();

                const response = await ApiClient.post(`/api/stocks/search?${queryString}`, searchParams);

                if (response.success) {
                    stocksData = response.data.content || [];
                    totalElements = response.data.totalElements || 0;

                    renderStocksList();
                    renderPagination(response.data);
                    updateTotalCount();
                    clearSelection();
                }
            } catch (error) {
                console.error('在庫検索エラー:', error);
                showAlert('在庫データの読み込み中にエラーが発生しました。', 'danger');
                stocksData = [];
                renderStocksList();
            } finally {
                showLoading(false);
            }
        }

        // 在庫リストのレンダリング
        function renderStocksList() {
            if (stocksData.length === 0) {
                showEmptyState();
                return;
            }

            hideEmptyState();

            if (currentView === 'table') {
                renderTableView();
            } else {
                renderCardView();
            }
        }

        // テーブルビューのレンダリング
        function renderTableView() {
            const tbody = document.getElementById('stocksTableBody');

            tbody.innerHTML = stocksData.map(stock => `
                <tr class="${selectedStocks.has(stock.id) ? 'selected' : ''}" onclick="toggleRowSelection(${stock.id}, event)">
                    <td onclick="event.stopPropagation();">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="${stock.id}"
                                   ${selectedStocks.has(stock.id) ? 'checked' : ''}
                                   onchange="toggleStockSelection(${stock.id})">
                        </div>
                    </td>
                    <td>
                        <div>
                            <div style="font-weight: 600; color: var(--dark-color);">${stock.medicineName}</div>
                            <div style="font-size: 0.85rem; color: #64748b;">${stock.medicineCode}</div>
                        </div>
                    </td>
                    <td>
                        <span class="lot-number">${stock.lotNumber}</span>
                    </td>
                    <td>
                        <span class="quantity ${getQuantityClass(stock)}" style="font-size: 1.1rem; font-weight: 600;">
                            ${formatNumber(stock.quantity)}
                        </span>
                    </td>
                    <td>
                        <span class="expiry-date ${getExpiryClass(stock.daysUntilExpiry)}">
                            ${formatDate(stock.expiryDate)}
                            ${stock.daysUntilExpiry <= 30 ? `<br><small>(${stock.daysUntilExpiry}日残り)</small>` : ''}
                        </span>
                    </td>
                    <td>${formatDate(stock.receivedDate)}</td>
                    <td>${stock.location || '-'}</td>
                    <td>
                        <span class="status-badge ${stock.status.toLowerCase()}">
                            <i class="fas ${stock.statusIcon || 'fa-question-circle'} me-1"></i>
                            ${stock.statusDescription}
                        </span>
                    </td>
                    <td>
                        <div class="d-flex gap-1">
                            <button class="btn btn-outline-primary btn-sm" onclick="viewStock(${stock.id})" title="詳細表示">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="btn btn-outline-warning btn-sm" onclick="editStock(${stock.id})" title="修正"
                                    ${!hasEditPermission() ? 'disabled' : ''}>
                                <i class="fas fa-edit"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // カードビューのレンダリング
        function renderCardView() {
            const cardView = document.getElementById('cardView');

            cardView.innerHTML = stocksData.map(stock => `
                <div class="stock-card ${selectedStocks.has(stock.id) ? 'selected' : ''}" onclick="toggleCardSelection(${stock.id})">
                    <div class="stock-card-header">
                        <div class="medicine-info">
                            <div class="medicine-name">${stock.medicineName}</div>
                            <span class="medicine-code">${stock.medicineCode}</span>
                        </div>
                        <div class="form-check" onclick="event.stopPropagation();">
                            <input class="form-check-input" type="checkbox" value="${stock.id}"
                                   ${selectedStocks.has(stock.id) ? 'checked' : ''}
                                   onchange="toggleStockSelection(${stock.id})">
                        </div>
                    </div>

                    <div class="stock-card-body">
                        <div class="stock-detail">
                            <div class="stock-detail-label">ロット番号</div>
                            <div class="stock-detail-value">
                                <span class="lot-number">${stock.lotNumber}</span>
                            </div>
                        </div>
                        <div class="stock-detail">
                            <div class="stock-detail-label">数量</div>
                            <div class="stock-detail-value">
                                <span class="quantity ${getQuantityClass(stock)}">${formatNumber(stock.quantity)}</span>
                            </div>
                        </div>
                        <div class="stock-detail">
                            <div class="stock-detail-label">使用期限</div>
                            <div class="stock-detail-value">
                                <span class="expiry-date ${getExpiryClass(stock.daysUntilExpiry)}">
                                    ${formatDate(stock.expiryDate)}
                                </span>
                                ${stock.daysUntilExpiry <= 30 ? `<div style="font-size: 0.8rem; color: #f59e0b;">${stock.daysUntilExpiry}日残り</div>` : ''}
                            </div>
                        </div>
                        <div class="stock-detail">
                            <div class="stock-detail-label">保管場所</div>
                            <div class="stock-detail-value">${stock.location || '-'}</div>
                        </div>
                    </div>

                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span class="status-badge ${stock.status.toLowerCase()}">
                            <i class="fas ${stock.statusIcon || 'fa-question-circle'} me-1"></i>
                            ${stock.statusDescription}
                        </span>
                        <div class="d-flex gap-1">
                            <button class="btn btn-outline-primary btn-sm" onclick="viewStock(${stock.id}); event.stopPropagation();" title="詳細表示">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="btn btn-outline-warning btn-sm" onclick="editStock(${stock.id}); event.stopPropagation();" title="修正"
                                    ${!hasEditPermission() ? 'disabled' : ''}>
                                <i class="fas fa-edit"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ページネーションのレンダリング
        function renderPagination(pageData) {
            const pagination = document.getElementById('pagination');
            const totalPages = pageData.totalPages || 0;

            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let paginationHTML = '';

            // 最初のページ
            paginationHTML += `
                <li class="page-item ${currentPage === 0 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="goToPage(0); return false;">
                        <i class="fas fa-angle-double-left"></i>
                    </a>
                </li>
            `;

            // 前のページ
            paginationHTML += `
                <li class="page-item ${currentPage === 0 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="goToPage(${currentPage - 1}); return false;">
                        <i class="fas fa-angle-left"></i>
                    </a>
                </li>
            `;

            // ページ番号
            const startPage = Math.max(0, currentPage - 2);
            const endPage = Math.min(totalPages - 1, currentPage + 2);

            for (let i = startPage; i <= endPage; i++) {
                paginationHTML += `
                    <li class="page-item ${i === currentPage ? 'active' : ''}">
                        <a class="page-link" href="#" onclick="goToPage(${i}); return false;">
                            ${i + 1}
                        </a>
                    </li>
                `;
            }

            // 次のページ
            paginationHTML += `
                <li class="page-item ${currentPage >= totalPages - 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="goToPage(${currentPage + 1}); return false;">
                        <i class="fas fa-angle-right"></i>
                    </a>
                </li>
            `;

            // 最後のページ
            paginationHTML += `
                <li class="page-item ${currentPage >= totalPages - 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="goToPage(${totalPages - 1}); return false;">
                        <i class="fas fa-angle-double-right"></i>
                    </a>
                </li>
            `;

            pagination.innerHTML = paginationHTML;

            // ページネーション情報更新
            const start = currentPage * pageSize + 1;
            const end = Math.min((currentPage + 1) * pageSize, totalElements);
            document.getElementById('paginationInfo').textContent =
                `総 ${formatNumber(totalElements)}件中 ${formatNumber(start)}-${formatNumber(end)}件を表示`;
        }

        // ユーティリティ関数
        function getQuantityClass(stock) {
            // 実際の医薬品の最小在庫量と比較
            if (stock.quantity <= 10) return 'critical';
            if (stock.quantity <= 30) return 'low';
            return '';
        }

        function getExpiryClass(daysUntilExpiry) {
            if (daysUntilExpiry <= 0) return 'danger';
            if (daysUntilExpiry <= 30) return 'warning';
            return '';
        }

        function hasEditPermission() {
            // 実際のユーザー権限を確認
            return true; // 仮
        }

        function updateTotalCount() {
            document.getElementById('totalCount').textContent = formatNumber(totalElements);
        }

        function showEmptyState() {
            document.getElementById('emptyState').style.display = 'block';
            document.getElementById('tableView').style.display = 'none';
            document.getElementById('cardView').style.display = 'none';
            document.getElementById('paginationContainer').style.display = 'none';
        }

        function hideEmptyState() {
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('paginationContainer').style.display = 'flex';

            if (currentView === 'table') {
                document.getElementById('tableView').style.display = 'block';
                document.getElementById('cardView').style.display = 'none';
            } else {
                document.getElementById('tableView').style.display = 'none';
                document.getElementById('cardView').style.display = 'block';
            }
        }

        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = show ? 'flex' : 'none';
        }

        // イベントハンドラ
        function switchView(view) {
            currentView = view;

            // トグルボタンの状態更新
            document.querySelectorAll('.view-toggle-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.view === view) {
                    btn.classList.add('active');
                }
            });

            renderStocksList();
        }

        function filterByStatus(status) {
            // 統計カードのアクティブ状態更新
            document.querySelectorAll('.stat-card').forEach(card => {
                card.classList.remove('active');
                if (card.dataset.filter === status) {
                    card.classList.add('active');
                }
            });

            // フィルター適用
            document.getElementById('status').value = status;
            currentPage = 0;
            searchStocks();
        }

        function resetSearch() {
            document.getElementById('searchForm').reset();

            // 統計カードのアクティブ状態リセット
            document.querySelectorAll('.stat-card').forEach(card => {
                card.classList.remove('active');
            });

            currentPage = 0;
            searchParams = {};
            searchStocks();
        }

        function refreshData() {
            loadStatsData();
            searchStocks();
        }

        function goToPage(page) {
            currentPage = page;
            searchStocks();
        }

        // 選択関連関数
        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('input[type="checkbox"][value]');

            if (selectAll.checked) {
                stocksData.forEach(stock => selectedStocks.add(stock.id));
                checkboxes.forEach(cb => cb.checked = true);
            } else {
                selectedStocks.clear();
                checkboxes.forEach(cb => cb.checked = false);
            }

            updateBulkActions();
            updateRowSelection();
        }

        function toggleStockSelection(stockId) {
            if (selectedStocks.has(stockId)) {
                selectedStocks.delete(stockId);
            } else {
                selectedStocks.add(stockId);
            }

            updateBulkActions();
            updateRowSelection();
        }

        function toggleRowSelection(stockId, event) {
            if (event.target.type !== 'checkbox') {
                toggleStockSelection(stockId);
                const checkbox = document.querySelector(`input[value="${stockId}"]`);
                if (checkbox) {
                    checkbox.checked = selectedStocks.has(stockId);
                }
            }
        }

        function toggleCardSelection(stockId) {
            toggleStockSelection(stockId);
            const checkbox = document.querySelector(`input[value="${stockId}"]`);
            if (checkbox) {
                checkbox.checked = selectedStocks.has(stockId);
            }
        }

        function updateRowSelection() {
            // テーブル行の選択状態更新
            document.querySelectorAll('tbody tr').forEach(row => {
                const checkbox = row.querySelector('input[type="checkbox"]');
                if (checkbox && selectedStocks.has(parseInt(checkbox.value))) {
                    row.classList.add('selected');
                } else {
                    row.classList.remove('selected');
                }
            });

            // カードの選択状態更新
            document.querySelectorAll('.stock-card').forEach(card => {
                const checkbox = card.querySelector('input[type="checkbox"]');
                if (checkbox && selectedStocks.has(parseInt(checkbox.value))) {
                    card.classList.add('selected');
                } else {
                    card.classList.remove('selected');
                }
            });
        }

        function updateBulkActions() {
            const bulkActions = document.getElementById('bulkActions');
            const selectedCount = document.getElementById('selectedCount');
            const selectAll = document.getElementById('selectAll');

            selectedCount.textContent = selectedStocks.size;

            if (selectedStocks.size > 0) {
                bulkActions.classList.add('show');
            } else {
                bulkActions.classList.remove('show');
            }

            // 全選択チェックボックスの状態更新
            if (selectedStocks.size === 0) {
                selectAll.indeterminate = false;
                selectAll.checked = false;
            } else if (selectedStocks.size === stocksData.length) {
                selectAll.indeterminate = false;
                selectAll.checked = true;
            } else {
                selectAll.indeterminate = true;
                selectAll.checked = false;
            }
        }

        function clearSelection() {
            selectedStocks.clear();
            updateBulkActions();

            // 全てのチェックボックスを解除
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);

            // 選択状態を削除
            document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
        }

        // アクション関数
        function viewStock(stockId) {
            window.location.href = `/stocks/${stockId}`;
        }

        function editStock(stockId) {
            window.location.href = `/stocks/${stockId}/edit`;
        }

        function exportData(format) {
            const params = new URLSearchParams(searchParams);
            params.append('format', format);
            window.open(`/api/stocks/export?${params.toString()}`, '_blank');
        }

        // 一括操作関数
        async function bulkUpdateLocation() {
            if (selectedStocks.size === 0) return;

            const newLocation = prompt('新しい保管場所を入力してください:');
            if (!newLocation) return;

            try {
                const response = await ApiClient.put('/api/stocks/batch', {
                    stockIds: Array.from(selectedStocks),
                    operation: 'UPDATE_LOCATION',
                    location: newLocation
                });

                if (response.success) {
                    showAlert(`${response.data.updatedCount}件の在庫の場所が変更されました。`, 'success');
                    refreshData();
                    clearSelection();
                }
            } catch (error) {
                showAlert('場所の変更中にエラーが発生しました。', 'danger');
            }
        }

        async function bulkUpdateStatus() {
            if (selectedStocks.size === 0) return;

            const newStatus = prompt('新しいステータスを入力してください (AVAILABLE, RESERVED, QUARANTINE, EXPIRED):');
            if (!newStatus) return;

            try {
                const response = await ApiClient.put('/api/stocks/batch', {
                    stockIds: Array.from(selectedStocks),
                    operation: 'UPDATE_STATUS',
                    status: newStatus
                });

                if (response.success) {
                    showAlert(`${response.data.updatedCount}件の在庫のステータスが変更されました。`, 'success');
                    refreshData();
                    clearSelection();
                }
            } catch (error) {
                showAlert('ステータスの変更中にエラーが発生しました。', 'danger');
            }
        }

        async function bulkDispose() {
            if (selectedStocks.size === 0) return;

            if (!confirm(`選択された${selectedStocks.size}件の在庫を廃棄処理しますか？`)) return;

            try {
                const response = await ApiClient.put('/api/stocks/batch', {
                    stockIds: Array.from(selectedStocks),
                    operation: 'DISPOSE'
                });

                if (response.success) {
                    showAlert(`${response.data.updatedCount}件の在庫が廃棄処理されました。`, 'success');
                    refreshData();
                    clearSelection();
                }
            } catch (error) {
                showAlert('廃棄処理中にエラーが発生しました。', 'danger');
            }
        }

        // キーボードショートカット
        document.addEventListener('keydown', function(e) {
            // Ctrl + A: 全選択
            if (e.ctrlKey && e.key === 'a' && e.target.tagName !== 'INPUT') {
                e.preventDefault();
                document.getElementById('selectAll').click();
            }

            // F5: 更新
            if (e.key === 'F5') {
                e.preventDefault();
                refreshData();
            }

            // Ctrl + F: 検索フィールドにフォーカス
            if (e.ctrlKey && e.key === 'f') {
                e.preventDefault();
                document.getElementById('keyword').focus();
            }

            // Escape: 選択解除
            if (e.key === 'Escape') {
                clearSelection();
            }
        });
    </script>
</th:block>

</html>
