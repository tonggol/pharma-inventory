<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<div layout:fragment="content">

    <!-- Page Header -->
    <div class="page-header">
        <h1 th:text="${user.fullName}">User Full Name</h1>
        <div>
            <a th:href="@{/users/{id}/edit(id=${user.id})}" class="btn btn-primary d-flex align-items-center">
                <i data-feather="edit-2" class="me-2"></i> Edit User
            </a>
            <a th:href="@{/users}" class="btn btn-outline-secondary">Back to List</a>
        </div>
    </div>

    <div class="card">
        <div class="card-header d-flex align-items-center">
            <i data-feather="user" class="me-2"></i>
            <span>User Profile</span>
        </div>
        <div class="card-body">
            <dl class="row">
                <dt class="col-sm-3">Username</dt>
                <dd class="col-sm-9" th:text="${user.username}">admin</dd>

                <dt class="col-sm-3">Full Name</dt>
                <dd class="col-sm-9" th:text="${user.fullName}">Administrator</dd>

                <dt class="col-sm-3">Email</dt>
                <dd class="col-sm-9" th:text="${user.email}">admin@example.com</dd>

                <dt class="col-sm-3">Role</dt>
                <dd class="col-sm-9" th:text="${user.roleDescription}">System Administrator</dd>

                <dt class="col-sm-3">Status</dt>
                <dd class="col-sm-9">
                    <span class="badge fs-6" th:classappend="${user.isActive ? 'bg-success-soft' : 'bg-danger-soft'}" th:text="${user.isActive ? 'Active' : 'Inactive'}">Active</span>
                </dd>

                <dt class="col-sm-3">Created At</dt>
                <dd class="col-sm-9" th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}">2023-01-01 12:00</dd>

                <dt class="col-sm-3">Last Login</dt>
                <dd class="col-sm-9" th:text="${user.lastLoginDate != null ? #temporals.format(user.lastLoginDate, 'yyyy-MM-dd HH:mm') : 'N/A'}">2023-10-27 10:00</dd>
            </dl>
        </div>
    </div>
</div>
</html>
