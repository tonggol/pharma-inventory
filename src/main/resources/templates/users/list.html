<!DOCTYPE html>
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}">
<head>
    <title>ユーザー管理 - 医薬品在庫管理システム</title>
</head>

<th:block layout:fragment="css">
    <style>
        /* ユーザーリスト特化スタイル */
        .page-header {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: #64748b;
            font-size: 1.1rem;
            margin-bottom: 0;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            text-align: center;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .stat-card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            margin: 0 auto 1rem;
        }

        .stat-card-icon.total { background: linear-gradient(135deg, var(--primary-color), #1e40af); }
        .stat-card-icon.active { background: linear-gradient(135deg, var(--success-color), #059669); }
        .stat-card-icon.admin { background: linear-gradient(135deg, var(--warning-color), #d97706); }
        .stat-card-icon.inactive { background: linear-gradient(135deg, #6b7280, #4b5563); }

        .stat-card-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 0.5rem;
        }

        .stat-card-label {
            font-size: 0.9rem;
            color: #64748b;
            font-weight: 500;
        }

        .content-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .content-header {
            padding: 2rem;
            border-bottom: 1px solid var(--border-color);
            background: #f8fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--dark-color);
            margin: 0;
        }

        .content-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .table-container {
            overflow-x: auto;
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        .users-table th {
            background: #f8fafc;
            padding: 1.25rem 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--dark-color);
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
        }

        .users-table td {
            padding: 1.25rem 1rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        .users-table tbody tr {
            transition: all 0.2s ease;
        }

        .users-table tbody tr:hover {
            background: rgba(44, 90, 160, 0.05);
            transform: scale(1.002);
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), #1e40af);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            margin-right: 1rem;
            flex-shrink: 0;
        }

        .user-info {
            display: flex;
            align-items: center;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            color: var(--dark-color);
            margin-bottom: 0.25rem;
        }

        .user-email {
            font-size: 0.85rem;
            color: #64748b;
        }

        .user-id {
            font-family: 'Courier New', monospace;
            background: rgba(59, 130, 246, 0.1);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #1e40af;
            font-weight: 600;
        }

        .role-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .role-badge.ADMIN {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }

        .role-badge.MANAGER {
            background: rgba(245, 158, 11, 0.1);
            color: #92400e;
        }

        .role-badge.PHARMACIST {
            background: rgba(16, 185, 129, 0.1);
            color: #065f46;
        }

        .role-badge.STAFF {
            background: rgba(59, 130, 246, 0.1);
            color: #1e40af;
        }

        .role-badge.USER {
            background: rgba(107, 114, 128, 0.1);
            color: #374151;
        }

        .status-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-badge.active {
            background: rgba(16, 185, 129, 0.1);
            color: #065f46;
        }

        .status-badge.inactive {
            background: rgba(107, 114, 128, 0.1);
            color: #374151;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-indicator.active {
            background: #10b981;
        }

        .status-indicator.inactive {
            background: #6b7280;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .btn {
            border-radius: 12px;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-sm {
            padding: 0.5rem 0.75rem;
            font-size: 0.85rem;
            border-radius: 8px;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success-color), #059669);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
            color: white;
        }

        .btn-outline-primary {
            background: white;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
        }

        .btn-outline-primary:hover {
            background: var(--primary-color);
            color: white;
        }

        .btn-outline-warning {
            background: white;
            border: 1px solid var(--warning-color);
            color: var(--warning-color);
        }

        .btn-outline-warning:hover {
            background: var(--warning-color);
            color: white;
        }

        .btn-outline-secondary {
            background: white;
            border: 1px solid var(--border-color);
            color: var(--dark-color);
        }

        .btn-outline-secondary:hover {
            background: #f8fafc;
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #64748b;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: #cbd5e1;
        }

        .empty-state-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--dark-color);
        }

        .empty-state-description {
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        .pagination-container {
            padding: 2rem;
            border-top: 1px solid var(--border-color);
            background: #f8fafc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pagination-info {
            color: #64748b;
            font-size: 0.9rem;
        }

        .pagination {
            display: flex;
            gap: 0.5rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .pagination .page-item {
            display: block;
        }

        .pagination .page-link {
            display: block;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--dark-color);
            text-decoration: none;
            transition: all 0.2s ease;
            background: white;
        }

        .pagination .page-link:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .pagination .page-item.active .page-link {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .pagination .page-item.disabled .page-link {
            background: #f8fafc;
            color: #94a3b8;
            border-color: var(--border-color);
            cursor: not-allowed;
        }

        /* レスポンシブデザイン */
        @media (max-width: 768px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }

            .content-header {
                flex-direction: column;
                gap: 1rem;
                align-items: stretch;
            }

            .users-table {
                font-size: 0.85rem;
            }

            .users-table th,
            .users-table td {
                padding: 0.75rem 0.5rem;
            }

            .user-avatar {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }

            .pagination-container {
                flex-direction: column;
                gap: 1rem;
            }
        }

        @media (max-width: 480px) {
            .stats-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</th:block>

<div layout:fragment="content">
    <!-- ページヘッダー -->
    <div class="page-header">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h1 class="page-title">ユーザー管理</h1>
                <p class="page-subtitle">システムユーザーを管理し、権限を設定できます。</p>
            </div>
            <div>
                <a href="/users/new" class="btn btn-success" sec:authorize="hasRole('ADMIN')">
                    <i class="fas fa-user-plus"></i>
                    新規ユーザー登録
                </a>
            </div>
        </div>
    </div>

    <!-- 統計カード -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-card-icon total">
                <i class="fas fa-users"></i>
            </div>
            <div class="stat-card-value" th:text="${userStats?.totalUsers ?: 0}">0</div>
            <div class="stat-card-label">全ユーザー</div>
        </div>

        <div class="stat-card">
            <div class="stat-card-icon active">
                <i class="fas fa-user-check"></i>
            </div>
            <div class="stat-card-value" th:text="${userStats?.activeUsers ?: 0}">0</div>
            <div class="stat-card-label">有効なユーザー</div>
        </div>

        <div class="stat-card">
            <div class="stat-card-icon admin">
                <i class="fas fa-user-shield"></i>
            </div>
            <div class="stat-card-value" th:text="${userStats?.adminUsers ?: 0}">0</div>
            <div class="stat-card-label">管理者</div>
        </div>

        <div class="stat-card">
            <div class="stat-card-icon inactive">
                <i class="fas fa-user-times"></i>
            </div>
            <div class="stat-card-value" th:text="${userStats?.inactiveUsers ?: 0}">0</div>
            <div class="stat-card-label">無効なユーザー</div>
        </div>
    </div>

    <!-- ユーザーリスト -->
    <div class="content-card" id="usersContainer">
        <div class="content-header">
            <h2 class="content-title">
                ユーザー一覧
                <span class="badge bg-primary" th:text="${users?.totalElements ?: 0}">0</span>
            </h2>
            <div class="content-actions">
                <button class="btn btn-outline-secondary" onclick="location.reload()">
                    <i class="fas fa-sync-alt"></i>
                    更新
                </button>
            </div>
        </div>

        <div class="table-container">
            <table class="users-table" th:if="${users != null and users.hasContent()}">
                <thead>
                <tr>
                    <th>ユーザー情報</th>
                    <th>ユーザーID</th>
                    <th>権限</th>
                    <th>部署</th>
                    <th>最終ログイン</th>
                    <th>ステータス</th>
                    <th>登録日</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users.content}">
                    <td>
                        <div class="user-info">
                            <div class="user-avatar" th:text="${#strings.substring(user.fullName ?: user.username ?: 'U', 0, 1)}">K</div>
                            <div class="user-details">
                                <div class="user-name" th:text="${user.fullName ?: user.username ?: 'N/A'}">キム・ヤクサ</div>
                                <div class="user-email" th:text="${user.email ?: 'N/A'}">kim@pharmacy.com</div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <span class="user-id" th:text="${user.username ?: 'N/A'}">kim_pharmacist</span>
                    </td>
                    <td>
                        <span class="role-badge"
                              th:classappend="${user.role?.name()}"
                              th:text="${user.roleDescription ?: user.role?.name() ?: 'N/A'}">薬剤師</span>
                    </td>
                    <td th:text="${user.departmentDescription ?: user.department ?: '-'}">薬局</td>
                    <td>
                        <span th:if="${user.lastLoginAt}"
                              th:text="${#temporals.format(user.lastLoginAt, 'yyyy-MM-dd HH:mm')}">2024-01-20 14:30</span>
                        <span th:unless="${user.lastLoginAt}" class="text-muted">ログイン記録なし</span>
                    </td>
                    <td>
                        <span class="status-badge"
                              th:classappend="${user.isActive ? 'active' : 'inactive'}">
                            <span class="status-indicator" th:classappend="${user.isActive ? 'active' : 'inactive'}"></span>
                            <span th:text="${user.statusDescription ?: (user.isActive ? '有効' : '無効')}">有効</span>
                        </span>
                    </td>
                    <td th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd')}" th:if="${user.createdAt}">2024-01-15</td>
                    <td th:unless="${user.createdAt}">-</td>
                    <td>
                        <div class="action-buttons">
                            <a th:href="@{/users/{id}(id=${user.id})}"
                               class="btn btn-outline-primary btn-sm"
                               title="詳細表示">
                                <i class="fas fa-eye"></i>
                            </a>
                            <a th:href="@{/users/{id}/edit(id=${user.id})}"
                               class="btn btn-outline-warning btn-sm"
                               sec:authorize="hasRole('ADMIN')"
                               title="修正">
                                <i class="fas fa-edit"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>

            <!-- 空の状態 -->
            <div class="empty-state" th:if="${users == null or !users.hasContent()}">
                <div class="empty-state-icon">
                    <i class="fas fa-users"></i>
                </div>
                <h3 class="empty-state-title">登録されたユーザーがいません</h3>
                <p class="empty-state-description">新しいユーザーを登録するか、検索条件を変更してみてください。</p>
                <a href="/users/new" class="btn btn-success" sec:authorize="hasRole('ADMIN')">
                    <i class="fas fa-user-plus"></i>
                    ユーザーを登録する
                </a>
            </div>
        </div>

        <!-- ページネーション -->
        <div class="pagination-container" th:if="${users != null and users.totalPages > 1}">
            <div class="pagination-info">
                <span th:text="|全 ${users.totalElements}件中 ${users.number * users.size + 1} - ${users.number * users.size + #lists.size(users.content)}件を表示|">
                    全 0件中 1-20件を表示
                </span>
            </div>

            <nav>
                <ul class="pagination">
                    <li class="page-item" th:classappend="${users.first ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/users(page=0, size=${users.size})}" th:unless="${users.first}">
                            <i class="fas fa-angle-double-left"></i>
                        </a>
                        <span class="page-link" th:if="${users.first}">
                            <i class="fas fa-angle-double-left"></i>
                        </span>
                    </li>

                    <li class="page-item" th:classappend="${users.first ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/users(page=${users.number - 1}, size=${users.size})}" th:unless="${users.first}">
                            <i class="fas fa-angle-left"></i>
                        </a>
                        <span class="page-link" th:if="${users.first}">
                            <i class="fas fa-angle-left"></i>
                        </span>
                    </li>

                    <li class="page-item active">
                        <span class="page-link" th:text="${users.number + 1}">1</span>
                    </li>

                    <li class="page-item" th:classappend="${users.last ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/users(page=${users.number + 1}, size=${users.size})}" th:unless="${users.last}">
                            <i class="fas fa-angle-right"></i>
                        </a>
                        <span class="page-link" th:if="${users.last}">
                            <i class="fas fa-angle-right"></i>
                        </span>
                    </li>

                    <li class="page-item" th:classappend="${users.last ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/users(page=${users.totalPages - 1}, size=${users.size})}" th:unless="${users.last}">
                            <i class="fas fa-angle-double-right"></i>
                        </a>
                        <span class="page-link" th:if="${users.last}">
                            <i class="fas fa-angle-double-right"></i>
                        </span>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<th:block layout:fragment="javascript">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('ユーザーリストページがロードされました');

            // ユーザー数の表示
            const users = /*[[${users}]]*/ null;
            if (users && users.content) {
                console.log('ロードされたユーザー数:', users.content.length);
                console.log('全ユーザー数:', users.totalElements);
            }
        });
    </script>
</th:block>

</html>
