<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/base}">
<head>
    <title>사용자 관리 - 의약품 재고관리 시스템</title>
</head>

<th:block layout:fragment="css">
    <style>
        /* 사용자 목록 특화 스타일 */
        .page-header {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
        }

        .page-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 0.5rem;
        }

        .page-subtitle {
            color: #64748b;
            font-size: 1.1rem;
            margin-bottom: 0;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            text-align: center;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .stat-card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            margin: 0 auto 1rem;
        }

        .stat-card-icon.total { background: linear-gradient(135deg, var(--primary-color), #1e40af); }
        .stat-card-icon.active { background: linear-gradient(135deg, var(--success-color), #059669); }
        .stat-card-icon.admin { background: linear-gradient(135deg, var(--warning-color), #d97706); }
        .stat-card-icon.inactive { background: linear-gradient(135deg, #6b7280, #4b5563); }

        .stat-card-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--dark-color);
            margin-bottom: 0.5rem;
        }

        .stat-card-label {
            font-size: 0.9rem;
            color: #64748b;
            font-weight: 500;
        }

        .content-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .content-header {
            padding: 2rem;
            border-bottom: 1px solid var(--border-color);
            background: #f8fafc;
            display: flex;
            justify-content: between;
            align-items: center;
        }

        .content-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--dark-color);
            margin: 0;
        }

        .content-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .table-container {
            overflow-x: auto;
        }

        .users-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        .users-table th {
            background: #f8fafc;
            padding: 1.25rem 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--dark-color);
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
        }

        .users-table td {
            padding: 1.25rem 1rem;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        .users-table tbody tr {
            transition: all 0.2s ease;
        }

        .users-table tbody tr:hover {
            background: rgba(44, 90, 160, 0.05);
            transform: scale(1.002);
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), #1e40af);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            margin-right: 1rem;
            flex-shrink: 0;
        }

        .user-info {
            display: flex;
            align-items: center;
        }

        .user-details {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            color: var(--dark-color);
            margin-bottom: 0.25rem;
        }

        .user-email {
            font-size: 0.85rem;
            color: #64748b;
        }

        .user-id {
            font-family: 'Courier New', monospace;
            background: rgba(59, 130, 246, 0.1);
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #1e40af;
            font-weight: 600;
        }

        .role-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .role-badge.ADMIN {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }

        .role-badge.MANAGER {
            background: rgba(245, 158, 11, 0.1);
            color: #92400e;
        }

        .role-badge.PHARMACIST {
            background: rgba(16, 185, 129, 0.1);
            color: #065f46;
        }

        .role-badge.STAFF {
            background: rgba(59, 130, 246, 0.1);
            color: #1e40af;
        }

        .role-badge.USER {
            background: rgba(107, 114, 128, 0.1);
            color: #374151;
        }

        .status-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-badge.active {
            background: rgba(16, 185, 129, 0.1);
            color: #065f46;
        }

        .status-badge.inactive {
            background: rgba(107, 114, 128, 0.1);
            color: #374151;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-indicator.active {
            background: #10b981;
        }

        .status-indicator.inactive {
            background: #6b7280;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .btn {
            border-radius: 12px;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-sm {
            padding: 0.5rem 0.75rem;
            font-size: 0.85rem;
            border-radius: 8px;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success-color), #059669);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
            color: white;
        }

        .btn-outline-primary {
            background: white;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
        }

        .btn-outline-primary:hover {
            background: var(--primary-color);
            color: white;
        }

        .btn-outline-warning {
            background: white;
            border: 1px solid var(--warning-color);
            color: var(--warning-color);
        }

        .btn-outline-warning:hover {
            background: var(--warning-color);
            color: white;
        }

        .btn-outline-secondary {
            background: white;
            border: 1px solid var(--border-color);
            color: var(--dark-color);
        }

        .btn-outline-secondary:hover {
            background: #f8fafc;
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #64748b;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: #cbd5e1;
        }

        .empty-state-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--dark-color);
        }

        .empty-state-description {
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        .pagination-container {
            padding: 2rem;
            border-top: 1px solid var(--border-color);
            background: #f8fafc;
            display: flex;
            justify-content: between;
            align-items: center;
        }

        .pagination-info {
            color: #64748b;
            font-size: 0.9rem;
        }

        .pagination {
            display: flex;
            gap: 0.5rem;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .pagination .page-item {
            display: block;
        }

        .pagination .page-link {
            display: block;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--dark-color);
            text-decoration: none;
            transition: all 0.2s ease;
            background: white;
        }

        .pagination .page-link:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .pagination .page-item.active .page-link {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .pagination .page-item.disabled .page-link {
            background: #f8fafc;
            color: #94a3b8;
            border-color: var(--border-color);
            cursor: not-allowed;
        }

        /* 반응형 디자인 */
        @media (max-width: 768px) {
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }

            .content-header {
                flex-direction: column;
                gap: 1rem;
                align-items: stretch;
            }

            .users-table {
                font-size: 0.85rem;
            }

            .users-table th,
            .users-table td {
                padding: 0.75rem 0.5rem;
            }

            .user-avatar {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }

            .pagination-container {
                flex-direction: column;
                gap: 1rem;
            }
        }

        @media (max-width: 480px) {
            .stats-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</th:block>

<div layout:fragment="content">
    <!-- 페이지 헤더 -->
    <div class="page-header">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h1 class="page-title">사용자 관리</h1>
                <p class="page-subtitle">시스템 사용자를 관리하고 권한을 설정할 수 있습니다.</p>
            </div>
            <div>
                <a href="/users/new" class="btn btn-success" sec:authorize="hasRole('ADMIN')">
                    <i class="fas fa-user-plus"></i>
                    새 사용자 등록
                </a>
            </div>
        </div>
    </div>

    <!-- 통계 카드 -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-card-icon total">
                <i class="fas fa-users"></i>
            </div>
            <div class="stat-card-value" th:text="${userStats?.totalUsers ?: 0}">0</div>
            <div class="stat-card-label">전체 사용자</div>
        </div>

        <div class="stat-card">
            <div class="stat-card-icon active">
                <i class="fas fa-user-check"></i>
            </div>
            <div class="stat-card-value" th:text="${userStats?.activeUsers ?: 0}">0</div>
            <div class="stat-card-label">활성 사용자</div>
        </div>

        <div class="stat-card">
            <div class="stat-card-icon admin">
                <i class="fas fa-user-shield"></i>
            </div>
            <div class="stat-card-value" th:text="${userStats?.adminUsers ?: 0}">0</div>
            <div class="stat-card-label">관리자</div>
        </div>

        <div class="stat-card">
            <div class="stat-card-icon inactive">
                <i class="fas fa-user-times"></i>
            </div>
            <div class="stat-card-value" th:text="${userStats?.inactiveUsers ?: 0}">0</div>
            <div class="stat-card-label">비활성 사용자</div>
        </div>
    </div>

    <!-- 사용자 목록 -->
    <div class="content-card" id="usersContainer">
        <div class="content-header">
            <h2 class="content-title">
                사용자 목록
                <span class="badge bg-primary" th:text="${users?.totalElements ?: 0}">0</span>
            </h2>
            <div class="content-actions">
                <button class="btn btn-outline-secondary" onclick="location.reload()">
                    <i class="fas fa-sync-alt"></i>
                    새로고침
                </button>
            </div>
        </div>

        <div class="table-container">
            <table class="users-table" th:if="${users != null and users.hasContent()}">
                <thead>
                <tr>
                    <th>사용자 정보</th>
                    <th>사용자ID</th>
                    <th>권한</th>
                    <th>부서</th>
                    <th>마지막 로그인</th>
                    <th>상태</th>
                    <th>등록일</th>
                    <th>작업</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users.content}">
                    <td>
                        <div class="user-info">
                            <div class="user-avatar" th:text="${#strings.substring(user.fullName ?: user.username ?: 'U', 0, 1)}">김</div>
                            <div class="user-details">
                                <div class="user-name" th:text="${user.fullName ?: user.username ?: 'N/A'}">김약사</div>
                                <div class="user-email" th:text="${user.email ?: 'N/A'}">kim@pharmacy.com</div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <span class="user-id" th:text="${user.username ?: 'N/A'}">kim_pharmacist</span>
                    </td>
                    <td>
                        <span class="role-badge"
                              th:classappend="${user.role?.name()}"
                              th:text="${user.roleDescription ?: user.role?.name() ?: 'N/A'}">약사</span>
                    </td>
                    <td th:text="${user.departmentDescription ?: user.department ?: '-'}">약국</td>
                    <td>
                        <span th:if="${user.lastLoginAt}"
                              th:text="${#temporals.format(user.lastLoginAt, 'yyyy-MM-dd HH:mm')}">2024-01-20 14:30</span>
                        <span th:unless="${user.lastLoginAt}" class="text-muted">로그인 기록 없음</span>
                    </td>
                    <td>
                        <span class="status-badge"
                              th:classappend="${user.isActive ? 'active' : 'inactive'}">
                            <span class="status-indicator" th:classappend="${user.isActive ? 'active' : 'inactive'}"></span>
                            <span th:text="${user.statusDescription ?: (user.isActive ? '활성' : '비활성')}">활성</span>
                        </span>
                    </td>
                    <td th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd')}" th:if="${user.createdAt}">2024-01-15</td>
                    <td th:unless="${user.createdAt}">-</td>
                    <td>
                        <div class="action-buttons">
                            <a th:href="@{/users/{id}(id=${user.id})}"
                               class="btn btn-outline-primary btn-sm"
                               title="상세 보기">
                                <i class="fas fa-eye"></i>
                            </a>
                            <a th:href="@{/users/{id}/edit(id=${user.id})}"
                               class="btn btn-outline-warning btn-sm"
                               sec:authorize="hasRole('ADMIN')"
                               title="수정">
                                <i class="fas fa-edit"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>

            <!-- 빈 상태 -->
            <div class="empty-state" th:if="${users == null or !users.hasContent()}">
                <div class="empty-state-icon">
                    <i class="fas fa-users"></i>
                </div>
                <h3 class="empty-state-title">등록된 사용자가 없습니다</h3>
                <p class="empty-state-description">새로운 사용자를 등록하거나 검색 조건을 변경해 보세요.</p>
                <a href="/users/new" class="btn btn-success" sec:authorize="hasRole('ADMIN')">
                    <i class="fas fa-user-plus"></i>
                    사용자 등록하기
                </a>
            </div>
        </div>

        <!-- 페이지네이션 -->
        <div class="pagination-container" th:if="${users != null and users.totalPages > 1}">
            <div class="pagination-info">
                <span th:text="|총 ${users.totalElements}개 중 ${users.number * users.size + 1}-${users.number * users.size + #lists.size(users.content)}개 표시|">
                    총 0개 중 1-20개 표시
                </span>
            </div>

            <nav>
                <ul class="pagination">
                    <li class="page-item" th:classappend="${users.first ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/users(page=0, size=${users.size})}" th:unless="${users.first}">
                            <i class="fas fa-angle-double-left"></i>
                        </a>
                        <span class="page-link" th:if="${users.first}">
                            <i class="fas fa-angle-double-left"></i>
                        </span>
                    </li>

                    <li class="page-item" th:classappend="${users.first ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/users(page=${users.number - 1}, size=${users.size})}" th:unless="${users.first}">
                            <i class="fas fa-angle-left"></i>
                        </a>
                        <span class="page-link" th:if="${users.first}">
                            <i class="fas fa-angle-left"></i>
                        </span>
                    </li>

                    <li class="page-item active">
                        <span class="page-link" th:text="${users.number + 1}">1</span>
                    </li>

                    <li class="page-item" th:classappend="${users.last ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/users(page=${users.number + 1}, size=${users.size})}" th:unless="${users.last}">
                            <i class="fas fa-angle-right"></i>
                        </a>
                        <span class="page-link" th:if="${users.last}">
                            <i class="fas fa-angle-right"></i>
                        </span>
                    </li>

                    <li class="page-item" th:classappend="${users.last ? 'disabled' : ''}">
                        <a class="page-link" th:href="@{/users(page=${users.totalPages - 1}, size=${users.size})}" th:unless="${users.last}">
                            <i class="fas fa-angle-double-right"></i>
                        </a>
                        <span class="page-link" th:if="${users.last}">
                            <i class="fas fa-angle-double-right"></i>
                        </span>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<th:block layout:fragment="javascript">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('사용자 목록 페이지 로드됨');

            // 사용자 수 표시
            const users = /*[[${users}]]*/ null;
            if (users && users.content) {
                console.log('로드된 사용자 수:', users.content.length);
                console.log('전체 사용자 수:', users.totalElements);
            }
        });
    </script>
</th:block>

</html>
