<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org" layout:decorate="~{layout}" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<div layout:fragment="content">

    <!-- Page Header -->
    <div class="page-header">
        <h1 th:text="${user.id == null ? 'Add New User' : 'Edit User'}">Add/Edit User</h1>
    </div>

    <form th:action="${user.id == null ? '/api/users' : '/api/users/' + user.id}" th:object="${user}" method="post">
        <input type="hidden" th:if="${user.id != null}" name="_method" value="put"/>

        <div class="card">
            <div class="card-header d-flex align-items-center">
                <i data-feather="edit-3" class="me-2"></i>
                <span>User Information</span>
            </div>
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" id="username" th:field="*{username}" class="form-control" th:readonly="${user.id != null}" required>
                    </div>
                    <div class="col-md-6">
                        <label for="fullName" class="form-label">Full Name</label>
                        <input type="text" id="fullName" th:field="*{fullName}" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" th:field="*{email}" class="form-control" required>
                    </div>
                    
                    <!-- Password only for new user -->
                    <div class="col-md-6" th:if="${user.id == null}">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" name="password" class="form-control" required>
                    </div>

                    <!-- Role and Status only for editing user -->
                    <div class="col-md-6" th:if="${user.id != null}">
                        <label for="role" class="form-label">Role</label>
                        <select id="role" th:field="*{role}" class="form-select">
                            <option th:each="r : ${T(com.pharma.inventory.entity.UserRole).values()}" th:value="${r}" th:text="${r.description}"></option>
                        </select>
                    </div>
                    <div class="col-12" th:if="${user.id != null}">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="isActive" th:field="*{isActive}">
                            <label class="form-check-label" for="isActive">User is Active</label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card-footer text-end">
                <a th:href="@{/users}" class="btn btn-outline-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary d-flex align-items-center d-inline-flex">
                    <i data-feather="save" class="me-2"></i> Save Changes
                </button>
            </div>
        </div>
    </form>
</div>
</html>
