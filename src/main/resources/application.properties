# ===================================
# 제약 재고관리 시스템 설정
# ===================================

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Application Info
spring.application.name=Pharmaceutical Inventory System
app.version=1.0.0
app.description=중소 제약회사를 위한 의약품 재고관리 시스템

# Database Configuration
# 데이터베이스 연결 정보는 환경 변수에서 자동으로 로드됩니다.
# SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# H2 Console (개발용)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Connection Pool 설정 (Cloud Run 최적화)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database=postgresql

#임시 사용자 계정 생성
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN

# JWT Configuration
jwt.secret=dGhpcy1pcy1hLXZlcnktc2VjdXJlLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLWFuZC12YWxpZGF0aW9u
jwt.access-token-validity-seconds=3600
jwt.refresh-token-validity-seconds=86400
jwt.issuer=PharmaInventory

# Logging Configuration
logging.level.root=INFO
logging.level.com.pharma.inventory=DEBUG
logging.level.org.springframework.web=DEBUG

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 정적 리소스 캐싱
spring.web.resources.cache.cachecontrol.max-age=3600

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Security Configuration (임시 - 개발용)
spring.security.user.name=admin
spring.security.user.password=admin123

# Actuator Configuration (모니터링)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# 재고 관리 비즈니스 설정
inventory.alert.low-stock-threshold=10
inventory.alert.expiry-days-warning=30
inventory.alert.enable-email=false
